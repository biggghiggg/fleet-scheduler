<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e}
:root{--primary:#2563eb;--danger:#dc2626;--success:#16a34a;--bg-white:#fff;--border:#e2e8f0;--text-muted:#64748b;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 4px 12px rgba(0,0,0,.15)}
button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:6px 14px;transition:all .15s}
button:hover{filter:brightness(0.92)}
input,select,textarea{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.app-header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header h1{font-size:20px;font-weight:700}
.conn-status{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.conn-status.ok{background:rgba(34,197,94,.3);color:#bbf7d0}
.conn-status.bad{background:rgba(239,68,68,.3);color:#fecaca}
.tabs{display:flex;gap:2px;background:var(--border);padding:3px;border-radius:8px;margin:16px 24px 0}
.tab{flex:1;text-align:center;padding:9px 16px;border-radius:6px;font-weight:500;font-size:13px;background:transparent;color:var(--text-muted);cursor:pointer}
.tab.on{background:var(--bg-white);color:var(--primary);box-shadow:var(--shadow)}
.main{padding:16px 24px 40px}
.week-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.week-nav button{background:var(--primary);color:#fff;padding:8px 16px;font-weight:600}
.week-label{font-size:16px;font-weight:600;min-width:250px;text-align:center}
.grid{overflow-x:auto;background:var(--bg-white);border-radius:10px;box-shadow:var(--shadow)}
.grid table{width:100%;border-collapse:collapse;min-width:900px}
.grid th{background:#f8fafc;padding:10px 8px;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid var(--border)}
.grid th:first-child{width:120px;text-align:left;padding-left:14px}
.grid td{border:1px solid #f1f5f9;padding:0;vertical-align:top;min-width:110px}
.grid td:first-child{font-weight:600;font-size:13px;padding:10px 14px;background:#f8fafc;border-right:2px solid var(--border);min-width:120px;width:120px}
.grid tr:hover td:first-child{background:#eef2ff}
.cell{min-height:60px;padding:4px;cursor:pointer;transition:background .1s}
.cell:hover{background:#f0f7ff}
.cell.conflict{background:#fef2f2}
.cell.today{background:#fffbeb}
.chip{background:#eef2ff;border:1px solid #c7d2fe;border-radius:5px;padding:4px 6px;margin:2px 0;font-size:11px;line-height:1.3;cursor:pointer;position:relative}
.chip:hover{background:#dbeafe}
.chip .loc{font-weight:600;color:#1e40af}
.chip .trk{color:#7c3aed;font-size:10px}
.chip .tm{color:var(--text-muted);font-size:10px}
.chip .x{position:absolute;top:1px;right:3px;font-size:10px;color:#999;cursor:pointer;display:none}
.chip:hover .x{display:block;color:var(--danger)}
.chip.tentative{background:#fefce8;border-color:#fde047}
.chip.confirmed{background:#f0fdf4;border-color:#86efac}
.chip.off,.chip.ooo{background:#f8f8f8;border-color:#ddd}
.cbadge{background:var(--danger);color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin:2px 0;display:inline-block}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-white);border-radius:12px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h2{font-size:18px;margin-bottom:16px}
.mrow{margin-bottom:12px}
.mrow label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.bp{background:var(--primary);color:#fff;font-weight:600;padding:8px 20px}
.bd{background:var(--danger);color:#fff;font-weight:600;padding:8px 20px}
.bc{background:#f1f5f9;color:#333;font-weight:500;padding:8px 20px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--bg-white);border-radius:8px;padding:14px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center}
.card .nm{font-weight:600;font-size:14px}
.card .sub{font-size:12px;color:var(--text-muted)}
.card .acts{display:flex;gap:4px}
.card .acts button{padding:4px 8px;font-size:11px}
.addrow{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.addrow input,.addrow select{width:auto;flex:1;min-width:120px}
.stitle{font-size:16px;font-weight:600;margin:20px 0 12px}
.rtable{background:var(--bg-white);border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
.rtable table{width:100%;border-collapse:collapse}
.rtable th{background:#f8fafc;padding:10px;font-size:12px;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid var(--border);text-align:left}
.rtable td{padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:13px}
.rtag{display:inline-block;background:#eef2ff;color:#3b82f6;padding:2px 8px;border-radius:4px;font-size:11px;margin:1px;font-weight:500}
.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;animation:su .3s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.ebtn{background:#eef2ff;color:var(--primary);padding:3px 8px;font-size:11px;cursor:pointer;border-radius:4px;border:none;margin-left:4px}
.ebtn:hover{background:#dbeafe}
.ied{border:1px solid var(--primary);border-radius:4px;padding:2px 6px;font-size:13px;width:auto}

@media print {
  body{background:#fff !important;font-family:Arial,Helvetica,sans-serif !important}
  .app-header,.tabs,.week-nav,.no-print,.toast{display:none !important}
  .main{padding:0 !important}
  .print-sheet{page-break-after:always;padding:24px 20px;max-width:100%}
  .print-sheet:last-child{page-break-after:avoid}
  .print-sheet *{color:#000 !important}
  .print-topbar h1{font-size:28px;font-weight:900;letter-spacing:-0.5px;margin:0;line-height:1.1}
  .print-job-num{background:#000 !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .print-job-num span{color:#fff !important}
  .print-job-card{page-break-inside:avoid}
  .print-footer{color:#666 !important}
  .print-weekly-table th{background:#e5e5e5 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

.print-sheet{border:2px solid #ccc;background:#fff;padding:24px 20px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.print-topbar{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:4px solid #000;padding-bottom:10px;margin-bottom:18px}
.print-topbar h1{font-size:28px;font-weight:900;letter-spacing:-0.5px;margin:0;line-height:1.1}
.print-topbar .print-meta{text-align:right;font-size:13px;line-height:1.6}
.print-topbar .print-meta strong{font-size:15px}
.print-job-card{border:2px solid #000;padding:0;margin-bottom:14px}
.print-job-num{background:#000;color:#fff;font-size:14px;font-weight:700;padding:6px 12px;display:flex;justify-content:space-between;align-items:center}
.print-job-body{padding:10px 12px}
.print-job-loc{font-size:20px;font-weight:800;margin-bottom:8px;border-bottom:1px solid #ccc;padding-bottom:6px}
.print-job-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;margin-bottom:6px}
.print-job-field{font-size:13px;line-height:1.7}
.print-job-field b{font-weight:700;display:inline-block;min-width:80px}
.print-job-notes{background:#f5f5f5;border:1px solid #ddd;padding:8px 10px;font-size:13px;white-space:pre-wrap;margin-top:6px;line-height:1.5}
.print-job-notes b{display:block;font-weight:700;margin-bottom:3px}
.print-footer{margin-top:16px;padding-top:12px;border-top:2px solid #000;font-size:10px;color:#999;display:flex;justify-content:space-between}
.print-weekly-table{width:100%;border-collapse:collapse;font-size:12px}
.print-weekly-table th,.print-weekly-table td{border:2px solid #000;padding:8px;vertical-align:top;text-align:left}
.print-weekly-table th{background:#e5e5e5;font-weight:800;font-size:12px;text-transform:uppercase}
.print-weekly-table td{font-size:12px;line-height:1.4}
.print-no-jobs{text-align:center;padding:30px;font-size:14px;color:#999;font-style:italic}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

async function api(method, url, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  return (await fetch('/api'+url, opts)).json();
}

function weekStart(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));dt.setHours(0,0,0,0);return dt;}
function fmt(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtLong(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekDates(ws){return DAYS.map((_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d;});}

function App(){
  const [tab,setTab]=useState('schedule');
  const [data,setData]=useState(null);
  const [ws,setWs]=useState(function(){return weekStart(new Date());});
  const [modal,setModal]=useState(null);
  const [eid,setEid]=useState(null);
  const [conn,setConn]=useState(false);
  const [toast,setToast]=useState(null);
  const tt=useRef(null);
  const show=function(m){setToast(m);if(tt.current)clearTimeout(tt.current);tt.current=setTimeout(function(){setToast(null);},3000);};

  useEffect(function(){
    var es;
    function go(){
      es=new EventSource('/api/events');
      es.onopen=function(){setConn(true);};
      es.onmessage=function(e){
        var m=JSON.parse(e.data);
        if(m.type==='connected'||m.type==='full-sync') setData(m.data);
        else if(m.type==='job-added'){setData(function(p){return p?Object.assign({},p,{jobs:p.jobs.concat([m.job])}):p;});show('Job added: '+(m.job.location||'New'));}
        else if(m.type==='job-updated') setData(function(p){return p?Object.assign({},p,{jobs:p.jobs.map(function(j){return j.id===m.job.id?m.job:j;})}):p;});
        else if(m.type==='job-deleted') setData(function(p){return p?Object.assign({},p,{jobs:p.jobs.filter(function(j){return j.id!==m.jobId;})}):p;});
      };
      es.onerror=function(){setConn(false);es.close();setTimeout(go,3000);};
    }
    go();
    return function(){if(es)es.close();};
  },[]);

  var dates=useMemo(function(){return weekDates(ws);},[ws]);
  var today=dk(new Date());
  var prev=function(){var d=new Date(ws);d.setDate(d.getDate()-7);setWs(d);};
  var next=function(){var d=new Date(ws);d.setDate(d.getDate()+7);setWs(d);};
  var now=function(){setWs(weekStart(new Date()));};

  if(!data) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontSize:18,color:'#666'}},'Connecting to server...');

  var cellJobs=function(did,date){return data.jobs.filter(function(j){return j.driverId===did&&j.date===dk(date);});};
  var cellConflict=function(did,date){
    var k=dk(date);var cj=data.jobs.filter(function(j){return j.driverId===did&&j.date===k;});
    for(var i=0;i<cj.length;i++){var j=cj[i];if(!j.truckId)continue;if(data.jobs.some(function(o){return o.date===k&&o.truckId===j.truckId&&o.id!==j.id;}))return true;}return false;
  };
  var dayConflicts=function(date){
    var k=dk(date);var dj=data.jobs.filter(function(j){return j.date===k&&j.truckId;});
    var m={};dj.forEach(function(j){if(!m[j.truckId])m[j.truckId]=[];m[j.truckId].push(j);});
    var c=[];Object.entries(m).forEach(function(entry){var tid=entry[0],jobs=entry[1];if(jobs.length>1){var t=data.trucks.find(function(x){return x.id===tid;});c.push({tn:t?t.name:tid,jobs:jobs});}});return c;
  };

  return React.createElement('div',null,
    React.createElement('div',{className:'app-header'},
      React.createElement('h1',null,'Fleet Scheduler'),
      React.createElement('span',{className:'conn-status '+(conn?'ok':'bad')},conn?'Live':'Reconnecting...')
    ),
    React.createElement('div',{className:'tabs'},
      [['schedule','Weekly Schedule'],['roster','People'],['fleet','Trucks & Trailers'],['routes','Route View'],['print','Print']].map(function(item){
        return React.createElement('div',{key:item[0],className:'tab '+(tab===item[0]?'on':''),onClick:function(){setTab(item[0]);}},item[1]);
      })
    ),
    React.createElement('div',{className:'main'},
      tab==='schedule'&&React.createElement(Schedule,{data:data,ws:ws,dates:dates,today:today,cellJobs:cellJobs,cellConflict:cellConflict,dayConflicts:dayConflicts,prev:prev,next:next,now:now,modal:modal,setModal:setModal,eid:eid,setEid:setEid}),
      tab==='roster'&&React.createElement(Roster,{data:data}),
      tab==='fleet'&&React.createElement(Fleet,{data:data}),
      tab==='routes'&&React.createElement(Routes,{data:data,dates:dates,ws:ws,prev:prev,next:next,now:now}),
      tab==='print'&&React.createElement(Print,{data:data,dates:dates,ws:ws,prev:prev,next:next,now:now})
    ),
    toast&&React.createElement('div',{className:'toast'},toast)
  );
}

function Schedule(props){
  var data=props.data,ws=props.ws,dates=props.dates,today=props.today,cellJobs=props.cellJobs,cellConflict=props.cellConflict,dayConflicts=props.dayConflicts,prev=props.prev,next=props.next,now=props.now,modal=props.modal,setModal=props.setModal,eid=props.eid,setEid=props.setEid;
  var end=new Date(ws);end.setDate(end.getDate()+6);
  var openAdd=function(did,date){setEid(null);setModal({driverId:did,date:dk(date),location:'',truckId:'',trailerId:'',timeWindow:'',equipment:[],notes:'',status:'Scheduled'});};
  var openEdit=function(job,e){e.stopPropagation();setEid(job.id);setModal(Object.assign({},job));};
  var save=function(){
    var p;
    if(eid) p=api('PUT','/jobs/'+eid,modal);
    else p=api('POST','/jobs',modal);
    p.then(function(){setModal(null);setEid(null);});
  };
  var del=function(id,e){if(e)e.stopPropagation();api('DELETE','/jobs/'+id);};

  return React.createElement('div',null,
    React.createElement('div',{className:'week-nav'},
      React.createElement('button',{onClick:prev},'\u25C0 Prev'),
      React.createElement('button',{onClick:now,style:{background:'#16a34a'}},'Today'),
      React.createElement('div',{className:'week-label'},fmt(ws)+' \u2014 '+fmt(end)),
      React.createElement('button',{onClick:next},'Next \u25B6')
    ),
    React.createElement('div',{className:'grid'},
      React.createElement('table',null,
        React.createElement('thead',null,
          React.createElement('tr',null,
            React.createElement('th',null,'Person'),
            dates.map(function(d,i){return React.createElement('th',{key:i,style:dk(d)===today?{background:'#fffbeb'}:{}},DAYS[i],React.createElement('br'),React.createElement('span',{style:{fontWeight:400,fontSize:11}},(d.getMonth()+1)+'/'+d.getDate()));})
          )
        ),
        React.createElement('tbody',null,
          data.drivers.map(function(driver){
            return React.createElement('tr',{key:driver.id},
              React.createElement('td',null,driver.name,React.createElement('div',{style:{fontSize:10,color:'var(--text-muted)',fontWeight:400}},driver.role)),
              dates.map(function(date,i){
                var jobs=cellJobs(driver.id,date);var conf=cellConflict(driver.id,date);var ist=dk(date)===today;
                return React.createElement('td',{key:i},
                  React.createElement('div',{className:'cell'+(conf?' conflict':'')+(ist?' today':''),onClick:function(){openAdd(driver.id,date);}},
                    conf&&React.createElement('div',{className:'cbadge'},'TRUCK CONFLICT'),
                    jobs.map(function(job){
                      var truck=data.trucks.find(function(t){return t.id===job.truckId;});
                      var trailer=data.trailers.find(function(t){return t.id===job.trailerId;});
                      var sc=job.status?(job.status.toLowerCase().replace(/\s/g,'')):'';
                      return React.createElement('div',{key:job.id,className:'chip '+sc,onClick:function(e){openEdit(job,e);}},
                        job.location&&React.createElement('div',{className:'loc'},job.location),
                        truck&&React.createElement('div',{className:'trk'},truck.name),
                        trailer&&React.createElement('div',{className:'trk'},trailer.name),
                        job.timeWindow&&React.createElement('div',{className:'tm'},job.timeWindow),
                        job.equipment&&job.equipment.length>0&&React.createElement('div',{style:{fontSize:9,color:'#888'}},job.equipment.join(', ')),
                        job.notes&&React.createElement('div',{style:{fontSize:10,color:'#666',marginTop:1}},job.notes.length>50?job.notes.slice(0,50)+'...':job.notes),
                        React.createElement('span',{className:'x',onClick:function(e){e.stopPropagation();del(job.id);}},'\u2715')
                      );
                    }),
                    jobs.length===0&&React.createElement('div',{style:{color:'#ccc',fontSize:11,textAlign:'center',marginTop:16}},'+')
                  )
                );
              })
            );
          })
        )
      )
    ),
    dates.map(function(date,i){
      var c=dayConflicts(date);if(!c.length)return null;
      return React.createElement('div',{key:i,style:{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:10,margin:'8px 0',fontSize:12}},
        React.createElement('strong',{style:{color:'var(--danger)'}},'Conflicts on '+DAYS[i]+' '+(date.getMonth()+1)+'/'+date.getDate()+':'),
        c.map(function(x,j){return React.createElement('div',{key:j,style:{marginTop:4}},x.tn+' assigned to: '+x.jobs.map(function(j2){var d=data.drivers.find(function(d){return d.id===j2.driverId;});return d?d.name:'';}).join(', '));})
      );
    }),
    modal&&React.createElement('div',{className:'overlay',onClick:function(){setModal(null);setEid(null);}},
      React.createElement('div',{className:'modal',onClick:function(e){e.stopPropagation();}},
        React.createElement('h2',null,eid?'Edit Job':'Add Job'),
        React.createElement('div',{className:'mrow'},
          React.createElement('label',null,'Date'),
          React.createElement('input',{type:'date',value:modal.date||'',onChange:function(e){setModal(Object.assign({},modal,{date:e.target.value}));}})
        ),
        React.createElement('div',{className:'mrow'},
          React.createElement('label',null,'Person'),
          React.createElement('select',{value:modal.driverId,onChange:function(e){setModal(Object.assign({},modal,{driverId:e.target.value}));}},
            data.drivers.map(function(d){return React.createElement('option',{key:d.id,value:d.id},d.name+' ('+d.role+')');})
          )
        ),
        React.createElement('div',{className:'mrow'},
          React.createElement('label',null,'Location / Job'),
          React.createElement('select',{value:(data.locations||[]).indexOf(modal.location)>=0?modal.location:'__custom',onChange:function(e){
            if(e.target.value==='__custom') setModal(Object.assign({},modal,{location:''}));
            else setModal(Object.assign({},modal,{location:e.target.value}));
          }},
            React.createElement('option',{value:''},'-- Select Location --'),
            (data.locations||[]).map(function(l){return React.createElement('option',{key:l,value:l},l);}),
            React.createElement('option',{value:'__custom'},'Other (type custom)...')
          ),
          (data.locations||[]).indexOf(modal.location)<0&&React.createElement('input',{value:modal.location,onChange:function(e){setModal(Object.assign({},modal,{location:e.target.value}));},placeholder:'Type custom location',style:{marginTop:4}})
        ),
        React.createElement('div',{className:'mrow'},
          React.createElement('label',null,'Truck'),
          React.createElement('select',{value:modal.truckId,onChange:function(e){setModal(Object.assign({},modal,{truckId:e.target.value}));}},
            React.createElement('option',{value:''},'-- None --'),
            data.trucks.filter(function(t){return t.status==='Active';}).map(function(t){return React.createElement('option',{key:t.id,value:t.id},t.name+' ('+t.type+')');})
          )
        ),
        React.createElement('div',{className:'mrow'},
          React.createElement('label',null,'Trailer'),
          React.createElement('select',{value:modal.trailerId,onChange:function(e){setModal(Object.assign({},modal,{trailerId:e.target.value}));}},
            React.createElement('option',{value:''},'-- None --'),
            data.trailers.map(function(t){return React.createElement('option',{key:t.id,value:t.id},t.name+' ('+t.type+')');})
          )
        ),
