function Pickups({data}) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [viewMode, setViewMode] = useState('active');
  const [search, setSearch] = useState('');
  const [filterPri, setFilterPri] = useState('');
  const [assigningId, setAssigningId] = useState(null);
  const [assignDriver, setAssignDriver] = useState('');
  const [assignDate, setAssignDate] = useState('');
  const [custSearch, setCustSearch] = useState('');
  const [custDropOpen, setCustDropOpen] = useState(false);

  const emptyForm = { date: '', customerIds: [], truckTrailerType: '', timeWindow: '', equipment: [], notes: '', status: 'Scheduled', priority: 'routine', salesPerson: '' };
  const [form, setForm] = useState(emptyForm);
  const [showPlacards, setShowPlacards] = useState(null);
  const [attachments, setAttachments] = useState([]);
  const [uploading, setUploading] = useState(false);

  const uploadFiles = async (files) => {
    setUploading(true);
    const newAttachments = [];
    for (const file of files) {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('category', 'Job Request');
      try {
        const res = await fetch('/api/documents', { method: 'POST', body: fd });
        const doc = await res.json();
        if (doc.id) newAttachments.push({ id: doc.id, name: doc.name });
      } catch(e) { console.error('Upload failed:', e); }
    }
    setAttachments(prev => [...prev, ...newAttachments]);
    setUploading(false);
  };

  const removeAttachment = (docId) => { setAttachments(prev => prev.filter(a => a.id !== docId)); };

  const getCustEntries = () => (form.customerIds || []).map(x => typeof x === 'string' ? { id: x, jobNotes: '' } : x);

  const pickups = data.pickups || [];
  const customers = (data.customers || []).slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  const active = pickups.filter(p => p.status !== 'archived');
  const archived = pickups.filter(p => p.status === 'archived');
  let display = viewMode === 'active' ? active : archived;

  if (filterPri) display = display.filter(p => p.priority === filterPri);
  if (search) {
    const s = search.toLowerCase();
    display = display.filter(p =>
      (p.customerName || '').toLowerCase().includes(s) ||
      (p.location || '').toLowerCase().includes(s) ||
      (p.salesPerson || '').toLowerCase().includes(s) ||
      (p.assignedDriverName || '').toLowerCase().includes(s) ||
      (p.notes || '').toLowerCase().includes(s)
    );
  }

  // Sort: emergency > urgent > routine, then by date
  const priOrd = { emergency: 0, urgent: 1, routine: 2 };
  display = display.slice().sort((a, b) => {
    const pa = priOrd[a.priority] ?? 2, pb = priOrd[b.priority] ?? 2;
    if (pa !== pb) return pa - pb;
    return (a.date || a.requestedDate || '').localeCompare(b.date || b.requestedDate || '');
  });

  const newCount = active.filter(p => p.status === 'new').length;
  const assignedCount = active.filter(p => p.status === 'assigned').length;

  const openAdd = () => { setEditId(null); setForm(emptyForm); setAttachments([]); setCustSearch(''); setCustDropOpen(false); setShowForm(true); };
  const openEdit = (p) => {
    setEditId(p.id);
    const custIds = p.customerIds || (p.customerId ? [{ id: p.customerId, jobNotes: (p.wasteDescription || '') + (p.containerInfo ? ' | ' + p.containerInfo : ''), timeWindow: p.requestedTimeWindow || '' }] : []);
    setForm({
      date: p.date || p.requestedDate || '',
      customerIds: custIds,
      truckTrailerType: p.truckTrailerType || '',
      timeWindow: p.timeWindow || p.requestedTimeWindow || '',
      equipment: p.equipment || [],
      notes: p.notes || '',
      status: p.status === 'new' || p.status === 'assigned' || p.status === 'archived' ? (p.jobStatus || 'Scheduled') : (p.status || 'Scheduled'),
      priority: p.priority || 'routine',
      salesPerson: p.salesPerson || ''
    });
    setAttachments(p.attachments || []);
    setCustSearch('');
    setCustDropOpen(false);
    setShowForm(true);
  };

  const save = async () => {
    if (getCustEntries().length === 0) { alert('Please add at least one customer'); return; }
    const entries = getCustEntries();
    const firstCust = entries.length > 0 ? (data.customers || []).find(c => c.id === entries[0].id) : null;
    const payload = { ...form, customerName: firstCust ? firstCust.name : '', customerId: firstCust ? firstCust.id : '', location: firstCust ? firstCust.name : '', attachments: attachments };
    if (editId) { await api('PUT', '/pickups/' + editId, payload); }
    else { await api('POST', '/pickups', payload); }
    setShowForm(false); setEditId(null); setForm(emptyForm);
  };

  const doAssign = async (pickupId) => {
    if (!assignDriver) { alert('Please select a driver'); return; }
    const driver = data.drivers.find(d => d.id === assignDriver);
    await api('PUT', '/pickups/' + pickupId + '/assign', {
      driverId: assignDriver,
      driverName: driver ? driver.name : '',
      date: assignDate
    });
    setAssigningId(null); setAssignDriver(''); setAssignDate('');
  };

  const doArchive = async (id) => { await api('PUT', '/pickups/' + id + '/archive'); };
  const doUnarchive = async (id) => { await api('PUT', '/pickups/' + id + '/unarchive'); };
  const doDelete = async (id) => { if (!confirm('Delete this job request?')) return; await api('DELETE', '/pickups/' + id); };

  const priBadge = (pri) => {
    const c = { emergency: '#dc2626', urgent: '#f59e0b', routine: '#10b981' };
    const l = { emergency: 'EMERGENCY', urgent: 'URGENT', routine: 'Routine' };
    return <span style={{ background: c[pri] || '#6b7280', color: '#fff', padding: '2px 8px', borderRadius: 12, fontSize: 11, fontWeight: 'bold' }}>{l[pri] || pri}</span>;
  };

  const stBadge = (st) => {
    const c = { 'new': '#3b82f6', assigned: '#8b5cf6', archived: '#6b7280' };
    const l = { 'new': 'NEW', assigned: 'ASSIGNED', archived: 'ARCHIVED' };
    return <span style={{ background: c[st] || '#6b7280', color: '#fff', padding: '2px 8px', borderRadius: 12, fontSize: 11, fontWeight: 'bold', marginLeft: 6 }}>{l[st] || st}</span>;
  };

  return (<div>
    {/* Header */}
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
        <h2 style={{ margin: 0, fontSize: 20 }}>Job Requests</h2>
        <span style={{ background: '#3b82f6', color: '#fff', borderRadius: 12, padding: '2px 10px', fontSize: 12, fontWeight: 'bold' }}>{newCount} New</span>
        <span style={{ background: '#8b5cf6', color: '#fff', borderRadius: 12, padding: '2px 10px', fontSize: 12, fontWeight: 'bold' }}>{assignedCount} Assigned</span>
      </div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
        <input type="text" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} style={{ padding: '6px 10px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 13, width: 160 }} />
        <select value={filterPri} onChange={e => setFilterPri(e.target.value)} style={{ padding: '6px 8px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 13 }}>
          <option value="">All Priorities</option>
          <option value="emergency">Emergency</option>
          <option value="urgent">Urgent</option>
          <option value="routine">Routine</option>
        </select>
        <button onClick={() => setViewMode('active')} style={{ background: viewMode === 'active' ? 'var(--primary)' : '#94a3b8', color: '#fff', fontWeight: 600 }}>Active</button>
        <button onClick={() => setViewMode('archived')} style={{ background: viewMode === 'archived' ? 'var(--primary)' : '#94a3b8', color: '#fff', fontWeight: 600 }}>Archive</button>
        <button onClick={openAdd} style={{ background: 'var(--success)', color: '#fff', fontWeight: 700, padding: '8px 16px' }}>+ New Job Request</button>
      </div>
    </div>

    {/* Job Request cards */}
    {display.length === 0 ? (
      <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>
        {viewMode === 'active' ? 'No active job requests. Click "+ New Job Request" to create one.' : 'No archived jobs.'}
      </div>
    ) : (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {display.map(pickup => {
          const isAssigning = assigningId === pickup.id;
          const borderColor = pickup.priority === 'emergency' ? '#dc2626' : pickup.priority === 'urgent' ? '#f59e0b' : '#10b981';
          return (
            <div key={pickup.id} style={{ background: 'var(--bg-white)', border: '1px solid var(--border)', borderLeft: '4px solid ' + borderColor, borderRadius: 8, padding: 14, boxShadow: 'var(--shadow)' }}>
              {/* Card header */}
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                <div>
                  <span style={{ fontWeight: 'bold', fontSize: 15 }}>{pickup.customerName || 'Unknown'}</span>
                  {stBadge(pickup.status)}
                  {priBadge(pickup.priority)}
                </div>
                <div style={{ display: 'flex', gap: 4 }}>
                  {viewMode === 'active' && pickup.status === 'new' && (
                    <button onClick={() => { setAssigningId(pickup.id); setAssignDate(pickup.requestedDate || ''); }} style={{ background: '#8b5cf6', color: '#fff', fontSize: 11, padding: '5px 12px' }}>Assign Driver</button>
                  )}
                  {viewMode === 'active' && pickup.status === 'assigned' && (
                    <button onClick={() => doArchive(pickup.id)} style={{ background: '#6b7280', color: '#fff', fontSize: 11, padding: '5px 12px' }}>Complete &amp; Archive</button>
                  )}
                  {viewMode === 'archived' && (
                    <button onClick={() => doUnarchive(pickup.id)} style={{ background: '#3b82f6', color: '#fff', fontSize: 11, padding: '5px 12px' }}>Restore</button>
                  )}
                  <button onClick={() => openEdit(pickup)} style={{ background: '#f59e0b', color: '#fff', fontSize: 11, padding: '5px 12px' }}>Edit</button>
                  <button onClick={() => doDelete(pickup.id)} style={{ background: '#ef4444', color: '#fff', fontSize: 11, padding: '5px 8px' }}>X</button>
                </div>
              </div>

              {/* Card body */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '6px 16px', fontSize: 13 }}>
                <div><strong>Customer(s): </strong>{(()=>{ const ids = pickup.customerIds || []; if (ids.length > 0) { return ids.map(x => { const cid = typeof x === 'string' ? x : x.id; const c = (data.customers || []).find(cx => cx.id === cid); return c ? c.name : cid; }).join(', '); } return pickup.customerName || '-'; })()}</div>
                <div><strong>Date: </strong>{(pickup.date || pickup.requestedDate) ? new Date((pickup.date || pickup.requestedDate) + 'T12:00:00').toLocaleDateString() : 'TBD'}</div>
                {(pickup.timeWindow || pickup.requestedTimeWindow) && <div><strong>Time Window: </strong>{pickup.timeWindow || pickup.requestedTimeWindow}</div>}
                <div><strong>Truck/Trailer Type: </strong>{pickup.truckTrailerType || '-'}</div>
                <div><strong>Salesperson: </strong>{pickup.salesPerson || '-'}</div>
                {pickup.assignedDriverName && <div><strong>Driver: </strong><span style={{ color: '#7c3aed', fontWeight: 'bold' }}>{pickup.assignedDriverName}</span>{pickup.assignedDate ? ' (' + new Date(pickup.assignedDate + 'T12:00:00').toLocaleDateString() + ')' : ''}</div>}
              </div>

              {/* Notes */}
              {pickup.notes && (
                <div style={{ marginTop: 6, padding: '6px 10px', background: '#fffbeb', borderRadius: 4, fontSize: 12, color: '#92400e' }}>
                  <strong>Notes: </strong>{pickup.notes}
                </div>
              )}

              {/* Attachments */}
              {pickup.attachments && pickup.attachments.length > 0 && (
                <div style={{ marginTop: 6, display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
                  <strong style={{ fontSize: 12 }}>Files:</strong>
                  {pickup.attachments.map(a => (
                    <a key={a.id} href={'/api/documents/' + a.id + '/view'} target="_blank" rel="noopener" style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: '#eff6ff', border: '1px solid #bfdbfe', borderRadius: 4, padding: '2px 8px', fontSize: 11, color: '#2563eb', fontWeight: 600, textDecoration: 'none' }}>
                      {a.name.toLowerCase().endsWith('.pdf') ? '\u{1F4C4}' : '\u{1F4CE}'} {a.name}
                    </a>
                  ))}
                </div>
              )}

              {/* Assignment panel */}
              {isAssigning && (
                <div style={{ marginTop: 10, padding: 12, background: '#f3f4f6', borderRadius: 8, border: '1px solid var(--border)' }}>
                  <div style={{ fontWeight: 'bold', marginBottom: 8, color: 'var(--primary)' }}>
                    Assign Driver <span style={{ fontSize: 11, fontWeight: 'normal', color: '#7c3aed' }}>(auto-adds to Weekly Schedule)</span>
                  </div>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
                    <select value={assignDriver} onChange={e => setAssignDriver(e.target.value)} style={{ padding: '6px 8px', borderRadius: 6, border: '1px solid var(--border)', minWidth: 180 }}>
                      <option value="">-- Select Driver --</option>
                      {data.drivers.map(d => (
                        <option key={d.id} value={d.id}>{d.name}{d.role ? ' (' + d.role + ')' : ''}</option>
                      ))}
                    </select>
                    <input type="date" value={assignDate} onChange={e => setAssignDate(e.target.value)} style={{ padding: '6px 8px', borderRadius: 6, border: '1px solid var(--border)', width: 'auto' }} />
                    <button onClick={() => doAssign(pickup.id)} style={{ background: 'var(--success)', color: '#fff', fontWeight: 700 }}>Assign</button>
                    <button onClick={() => setAssigningId(null)} style={{ background: '#94a3b8', color: '#fff' }}>Cancel</button>
                  </div>
                </div>
              )}

              {/* Metadata */}
              <div style={{ marginTop: 6, fontSize: 11, color: 'var(--text-muted)', display: 'flex', gap: 12 }}>
                <span>Created: {new Date(pickup.createdAt).toLocaleDateString()}</span>
                {pickup.routeBoardJobId && <span style={{ color: '#7c3aed' }}>On Schedule</span>}
              </div>
            </div>
          );
        })}
      </div>
    )}

    {/* New/Edit Job Request Modal */}
    {showForm&&(<div className="overlay">
      <div className="modal">
        <h2>{editId?'Edit Job Request':'New Job Request'}</h2>
        <div className="mrow"><label>Date</label>
          <input type="date" value={form.date||''} onChange={e=>setForm({...form,date:e.target.value})}/>
        </div>
        <div className="mrow"><label>Customer(s)</label>
          <div style={{position:'relative'}}>
            <input value={custSearch} onChange={e=>{setCustSearch(e.target.value);setCustDropOpen(true);}} onFocus={()=>setCustDropOpen(true)} placeholder="Search customers..." style={{width:'100%'}}/>
            {custDropOpen&&(()=>{
              const allCust=(data.customers||[]).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
              const entries=getCustEntries();
              const selectedIds=entries.map(x=>x.id);
              const filtered=custSearch?allCust.filter(c=>(c.name||'').toLowerCase().includes(custSearch.toLowerCase())):allCust;
              return filtered.length>0?<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #ccc',borderRadius:6,maxHeight:200,overflowY:'auto',zIndex:100,boxShadow:'0 4px 12px rgba(0,0,0,.15)'}}>
                {filtered.map(c=><div key={c.id} onClick={()=>{if(!selectedIds.includes(c.id)){setForm({...form,customerIds:[...entries,{id:c.id,jobNotes:''}]});}setCustSearch('');setCustDropOpen(false);}} style={{padding:'8px 12px',cursor:'pointer',fontSize:13,background:selectedIds.includes(c.id)?'#dbeafe':'#fff',borderBottom:'1px solid #f0f0f0'}} onMouseEnter={e=>e.target.style.background='#eff6ff'} onMouseLeave={e=>e.target.style.background=selectedIds.includes(c.id)?'#dbeafe':'#fff'}>
                  <strong>{c.name}</strong>{c.city?<span style={{color:'#666',marginLeft:6,fontSize:12}}>{c.city}{c.state?', '+c.state:''}</span>:null}
                  {selectedIds.includes(c.id)&&<span style={{float:'right',color:'#2563eb',fontSize:11}}>selected</span>}
                </div>)}
              </div>:null;
            })()}
          </div>
          {getCustEntries().length>0&&<div style={{marginTop:6}}>{getCustEntries().map((entry,idx)=>{const c=(data.customers||[]).find(x=>x.id===entry.id);const ep=entry.placards||[];const eeq=entry.equipment||[];return c?<div key={entry.id} style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:6,padding:10,marginBottom:6,fontSize:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <strong style={{fontSize:13}}>{c.name}</strong>
              <span onClick={()=>{const updated=getCustEntries().filter(x=>x.id!==entry.id);setForm({...form,customerIds:updated});}} style={{cursor:'pointer',color:'#dc2626',fontWeight:700,fontSize:14,padding:'0 4px'}}>&times;</span>
            </div>
            {c.address&&<div><strong>Address:</strong> {c.address}{c.city?', '+c.city:''}{c.state?' '+c.state:''} {c.zip}</div>}
            {c.phone&&<div><strong>Phone:</strong> {c.phone}</div>}
            {c.contact&&<div><strong>Contact:</strong> {c.contact}</div>}
            {(c.pricing||c.notes)&&<div><strong>Pricing/Notes:</strong> {c.pricing||c.notes}</div>}
            <div style={{marginTop:6}}><label style={{fontSize:11,fontWeight:700,color:'#333'}}>Time Window:</label>
              <input value={entry.timeWindow||''} onChange={e=>{const updated=getCustEntries().map(x=>x.id===entry.id?{...x,timeWindow:e.target.value}:x);setForm({...form,customerIds:updated});}} placeholder="e.g. 8:00 AM, Be onsite by 10 AM" style={{width:'100%',marginTop:2,fontSize:12,padding:4,borderRadius:4,border:'1px solid #ccc'}}/></div>
            <div style={{marginTop:4}}><label style={{fontSize:11,fontWeight:700,color:'#333'}}>Equipment:</label>
              <div style={{marginTop:2}}>{data.equipment.filter(eq=>eq!=='Placards').map(eq=>(<span key={eq} style={{display:'inline-block',marginRight:10,marginBottom:3}}>
                <label style={{fontSize:11,cursor:'pointer'}}>
                <input type="checkbox" checked={eeq.includes(eq)} style={{marginRight:3,width:'auto'}}
                  onChange={e=>{const updated=getCustEntries().map(x=>x.id===entry.id?{...x,equipment:e.target.checked?[...eeq,eq]:eeq.filter(z=>z!==eq)}:x);setForm({...form,customerIds:updated});}}/>
                {eq}</label></span>))}</div></div>
            <div style={{marginTop:4,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <button onClick={()=>setShowPlacards(entry.id)} style={{background:'#d97706',color:'#fff',border:'none',padding:'3px 10px',borderRadius:4,fontSize:11,cursor:'pointer',fontWeight:600}}>Placards ({ep.length})</button>
              {ep.length>0&&ep.map(p=><span key={p} style={{display:'inline-block',background:'#fef3c7',border:'1px solid #d97706',borderRadius:4,padding:'1px 6px',fontSize:10,fontWeight:600}}>{p}</span>)}
            </div>
            <div style={{marginTop:6}}><label style={{fontSize:12,fontWeight:700,color:'#1d4ed8'}}>Job Notes for {c.name}:</label>
              <textarea value={entry.jobNotes||''} onChange={e=>{const updated=getCustEntries().map(x=>x.id===entry.id?{...x,jobNotes:e.target.value}:x);setForm({...form,customerIds:updated});}} rows={2} placeholder="Special instructions, requirements for this customer..." style={{width:'100%',marginTop:3,fontSize:12,padding:6,borderRadius:4,border:'1px solid #93c5fd'}}/></div>
          </div>:null;})}</div>}
        </div>
        <div className="mrow"><label>Truck/Trailer Type</label>
          <select value={form.truckTrailerType||''} onChange={e=>setForm({...form,truckTrailerType:e.target.value})}>
            <option value="">-- Select --</option>
            <option value="26 Foot Trailer">26 Foot Trailer</option>
            <option value="53 Foot Trailer">53 Foot Trailer</option>
            <option value="Box Truck">Box Truck</option>
            <option value="Flatbed">Flatbed</option>
            <option value="Roll Off Trailer">Roll Off Trailer</option>
            <option value="Vacuum Trailer">Vacuum Trailer</option>
          </select></div>
        {showPlacards&&(()=>{const pcid=showPlacards;const pEntry=getCustEntries().find(x=>x.id===pcid);const pCust=(data.customers||[]).find(x=>x.id===pcid);const curPl=pEntry?pEntry.placards||[]:[];
          const togglePl=(p)=>{const updated=getCustEntries().map(x=>x.id===pcid?{...x,placards:curPl.includes(p)?curPl.filter(z=>z!==p):[...curPl,p]}:x);setForm({...form,customerIds:updated});};
          return <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setShowPlacards(null)}>
          <div style={{background:'#fff',borderRadius:12,padding:20,width:600,maxWidth:'95vw',maxHeight:'80vh',overflowY:'auto',boxShadow:'0 8px 30px rgba(0,0,0,.3)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <h3 style={{fontSize:16,fontWeight:700}}>Placards for {pCust?pCust.name:''}</h3>
              <button className="bc" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>setShowPlacards(null)}>Done</button>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:'#b45309',marginBottom:4,borderBottom:'2px solid #d97706',paddingBottom:3}}>Hazard Class Placards (no UN number)</div>
              <div>{HAZARD_CLASSES.map(hc=>(<div key={hc} style={{display:'inline-block',marginRight:10,marginBottom:4}}>
                <label style={{fontSize:12,cursor:'pointer',fontWeight:curPl.includes(hc)?600:400}}>
                  <input type="checkbox" checked={curPl.includes(hc)} style={{marginRight:3,width:'auto'}}
                    onChange={()=>togglePl(hc)}/>
                  {hc}
                </label></div>))}</div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text-muted)',marginBottom:8,marginTop:8}}>&#9660; 4-Digit UN Number Placards</div>
            {PLACARD_LIST.map(grp=>(<div key={grp.cat} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--primary)',marginBottom:4,borderBottom:'1px solid var(--border)',paddingBottom:3}}>{grp.cat}</div>
              <div>{grp.items.map(p=>(<div key={p} style={{display:'inline-block',marginRight:10,marginBottom:4}}>
                <label style={{fontSize:12,cursor:'pointer',fontWeight:curPl.includes(p)?600:400}}>
                  <input type="checkbox" checked={curPl.includes(p)} style={{marginRight:3,width:'auto'}}
                    onChange={()=>togglePl(p)}/>
                  {p}
                </label></div>))}</div>
            </div>))}
          </div>
        </div>;})()}
        <div className="mrow"><label>Priority</label>
          <select value={form.priority||'routine'} onChange={e=>setForm({...form,priority:e.target.value})}>
            <option value="routine">Routine</option><option value="urgent">Urgent</option><option value="emergency">Emergency</option>
          </select></div>
        <div className="mrow"><label>Salesperson</label>
          <input value={form.salesPerson||''} onChange={e=>setForm({...form,salesPerson:e.target.value})} placeholder="Salesperson name"/></div>
        <div className="mrow"><label>Attachments</label>
          <div>
            <input type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx,.csv,.txt" onChange={e=>{if(e.target.files.length>0){uploadFiles(Array.from(e.target.files));e.target.value='';}}} style={{fontSize:12}}/>
            {uploading&&<span style={{color:'#3b82f6',fontSize:12,marginLeft:8}}>Uploading...</span>}
            {attachments.length>0&&<div style={{marginTop:6,display:'flex',flexDirection:'column',gap:4}}>
              {attachments.map(a=>(
                <div key={a.id} style={{display:'flex',alignItems:'center',gap:8,background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:4,padding:'4px 8px',fontSize:12}}>
                  <a href={'/api/documents/'+a.id+'/view'} target="_blank" rel="noopener" style={{color:'#2563eb',fontWeight:600,flex:1}}>{a.name}</a>
                  <span onClick={()=>removeAttachment(a.id)} style={{cursor:'pointer',color:'#dc2626',fontWeight:700,fontSize:14}}>&times;</span>
                </div>
              ))}
            </div>}
          </div></div>
        <div className="mrow"><label>Notes</label>
          <textarea value={form.notes||''} onChange={e=>setForm({...form,notes:e.target.value})} rows={3} placeholder="Special instructions, reference numbers, etc."/></div>
        <div className="mactions">
          <button className="bc" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
          <button className="bp" onClick={save}>{editId?'Update Job Request':'Create Job Request'}</button>
        </div>
      </div>
    </div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
/* Safari-compatible print handlers - opens new window for reliable printing */
document.addEventListener('click', function(e) {
  var btn = e.target;
  while(btn && btn !== document) {
    if(btn.id === 'printBtn') {
      e.preventDefault();
      e.stopPropagation();
      window.print();
      return;
    }
    btn = btn.parentElement;
  }
});
</script>
</body>
</html>
