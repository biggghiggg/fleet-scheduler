<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RouteBoard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;transition:background .3s,color .3s}
:root{--primary:#2563eb;--danger:#dc2626;--success:#16a34a;--bg-white:#fff;--border:#e2e8f0;--text-muted:#64748b;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 4px 12px rgba(0,0,0,.15)}
body.dark{background:#121212;color:#e0e0e0}
body.dark :root,.dark{--bg-white:#1e1e1e;--border:#333;--text-muted:#999;--shadow:0 1px 3px rgba(0,0,0,.4);--shadow-lg:0 4px 12px rgba(0,0,0,.5)}
body.dark input,body.dark select,body.dark textarea{background:#2a2a2a;color:#e0e0e0;border-color:#444}
body.dark .grid{background:#1e1e1e}
body.dark .grid th{background:#252525;color:#aaa}
body.dark .grid td{border-color:#333}
body.dark .grid td:first-child{background:#252525}
body.dark .cell{background:#1e1e1e}
body.dark .cell.today{background:#1a2a1a}
body.dark .chip{background:#2a2a2a;border-color:#444}
body.dark .tabs{background:#333}
body.dark .tab{color:#999}
body.dark .tab.on{background:#1e1e1e;color:#60a5fa}
body.dark .modal{background:#1e1e1e;color:#e0e0e0}
body.dark .overlay{background:rgba(0,0,0,.7)}
body.dark button.bp{background:var(--primary);color:#fff}
body.dark button.bc{background:#333;color:#e0e0e0}
body.dark button.bd{background:#7f1d1d;color:#fca5a5}
button{cursor:pointer;border:none;border-radius:6px;font-size:13px;padding:6px 14px;transition:all .15s}
button:hover{filter:brightness(0.92)}
input,select,textarea{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,.15)}

.app-header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header h1{font-size:20px;font-weight:700}
.conn-status{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.conn-status.ok{background:rgba(34,197,94,.3);color:#bbf7d0}
.conn-status.bad{background:rgba(239,68,68,.3);color:#fecaca}

.tabs{display:flex;gap:2px;background:var(--border);padding:3px;border-radius:8px;margin:16px 24px 0}
.tab{flex:1;text-align:center;padding:9px 16px;border-radius:6px;font-weight:500;font-size:13px;background:transparent;color:var(--text-muted);cursor:pointer}
.tab.on{background:var(--bg-white);color:var(--primary);box-shadow:var(--shadow)}
.main{padding:16px 24px 40px}

.week-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.week-nav button{background:var(--primary);color:#fff;padding:8px 16px;font-weight:600}
.week-label{font-size:16px;font-weight:600;min-width:250px;text-align:center}

.grid{overflow-x:auto;background:var(--bg-white);border-radius:10px;box-shadow:var(--shadow)}
.grid table{width:100%;border-collapse:collapse;min-width:900px}
.grid th{background:#f8fafc;padding:10px 8px;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid var(--border)}
.grid th:first-child{width:120px;text-align:left;padding-left:14px}
.grid td{border:1px solid #f1f5f9;padding:0;vertical-align:top;min-width:110px}
.grid td:first-child{font-weight:600;font-size:13px;padding:10px 14px;background:#f8fafc;border-right:2px solid var(--border);min-width:120px;width:120px}
.grid tr:hover td:first-child{background:#eef2ff}

.cell{min-height:60px;padding:4px;cursor:pointer;transition:background .1s}
.cell:hover{background:#f0f7ff}
.cell.conflict{background:#fef2f2}
.cell.today{background:#fffbeb}

.chip{background:#eef2ff;border:1px solid #c7d2fe;border-radius:5px;padding:4px 6px;margin:2px 0;font-size:11px;line-height:1.3;cursor:pointer;position:relative}
.chip:hover{background:#dbeafe}
.chip .loc{font-weight:600;color:#1e40af}
.chip .trk{color:#7c3aed;font-size:10px}
.chip .tm{color:var(--text-muted);font-size:10px}
.chip .x{position:absolute;top:1px;right:3px;font-size:10px;color:#999;cursor:pointer;display:none}
.chip:hover .x{display:block;color:var(--danger)}
.chip.tentative{background:#fefce8;border-color:#fde047}
.chip.confirmed{background:#f0fdf4;border-color:#86efac}
.chip.off,.chip.ooo{background:#f8f8f8;border-color:#ddd}

.cbadge{background:var(--danger);color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin:2px 0;display:inline-block}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-white);border-radius:12px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h2{font-size:18px;margin-bottom:16px}
.mrow{margin-bottom:12px}
.mrow label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.bp{background:var(--primary);color:#fff;font-weight:600;padding:8px 20px}
.bd{background:var(--danger);color:#fff;font-weight:600;padding:8px 20px}
.bc{background:#f1f5f9;color:#333;font-weight:500;padding:8px 20px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--bg-white);border-radius:8px;padding:14px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center}
.card .nm{font-weight:600;font-size:14px}
.card .sub{font-size:12px;color:var(--text-muted)}
.card .acts{display:flex;gap:4px}
.card .acts button{padding:4px 8px;font-size:11px}
.addrow{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.addrow input,.addrow select{width:auto;flex:1;min-width:120px}
.stitle{font-size:16px;font-weight:600;margin:20px 0 12px}

.rtable{background:var(--bg-white);border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
.rtable table{width:100%;border-collapse:collapse}
.rtable th{background:#f8fafc;padding:10px;font-size:12px;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid var(--border);text-align:left}
.rtable td{padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:13px}
.rtag{display:inline-block;background:#eef2ff;color:#3b82f6;padding:2px 8px;border-radius:4px;font-size:11px;margin:1px;font-weight:500}

.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;animation:su .3s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.ebtn{background:#eef2ff;color:var(--primary);padding:3px 8px;font-size:11px;cursor:pointer;border-radius:4px;border:none;margin-left:4px}
.ebtn:hover{background:#dbeafe}
.ied{border:1px solid var(--primary);border-radius:4px;padding:2px 6px;font-size:13px;width:auto}

/* PRINT STYLES */
@media print {
  body{background:#fff !important;font-family:Arial,Helvetica,sans-serif !important}
  .app-header,.tabs,.week-nav,.no-print,.toast{display:none !important}
  .main{padding:0 !important}
  .print-sheet{page-break-after:always;padding:24px 20px;max-width:100%}
  .print-sheet:last-child{page-break-after:avoid}
  .print-sheet *{color:#000 !important}
  .print-topbar{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:4px solid #000;padding-bottom:10px;margin-bottom:18px}
  .print-topbar h1{font-size:28px;font-weight:900;letter-spacing:-0.5px;margin:0;line-height:1.1}
  .print-topbar .print-meta{text-align:right;font-size:13px;line-height:1.6}
  .print-topbar .print-meta strong{font-size:15px}
  .print-job-card{border:2px solid #000;border-radius:0;padding:0;margin-bottom:14px;page-break-inside:avoid}
  .print-job-num{background:#000 !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-size:14px;font-weight:700;padding:6px 12px;display:flex;justify-content:space-between;align-items:center}
  .print-job-num span{color:#fff !important}
  .print-job-body{padding:10px 12px}
  .print-job-loc{font-size:20px;font-weight:800;margin-bottom:8px;border-bottom:1px solid #ccc;padding-bottom:6px}
  .print-job-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;margin-bottom:6px}
  .print-job-field{font-size:13px;line-height:1.7}
  .print-job-field b{font-weight:700;display:inline-block;min-width:80px}
  .print-job-notes{background:#f0f0f0 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border:1px solid #ccc;padding:8px 10px;font-size:13px;white-space:pre-wrap;margin-top:6px;line-height:1.5}
  .print-job-notes b{display:block;font-weight:700;margin-bottom:3px}
  .print-footer{margin-top:auto;padding-top:12px;border-top:2px solid #000;font-size:10px;color:#666 !important;display:flex;justify-content:space-between}
  .print-weekly-table{width:100%;border-collapse:collapse;font-size:11px}
  .print-weekly-table th,.print-weekly-table td{border:2px solid #000;padding:8px;vertical-align:top;text-align:left}
  .print-weekly-table th{background:#e5e5e5 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-weight:800;font-size:12px;text-transform:uppercase}
  .print-weekly-table td{font-size:11px;line-height:1.4}
  .print-no-jobs{text-align:center;padding:30px;font-size:14px;color:#999 !important;font-style:italic}
}
/* Screen preview of print sheets */
.print-sheet{border:2px solid #ccc;background:#fff;padding:24px 20px;margin:12px 0;border-radius:0;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.print-topbar{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:4px solid #000;padding-bottom:10px;margin-bottom:18px}
.print-topbar h1{font-size:28px;font-weight:900;letter-spacing:-0.5px;margin:0;line-height:1.1}
.print-topbar .print-meta{text-align:right;font-size:13px;line-height:1.6}
.print-topbar .print-meta strong{font-size:15px}
.print-job-card{border:2px solid #000;border-radius:0;padding:0;margin-bottom:14px}
.print-job-num{background:#000;color:#fff;font-size:14px;font-weight:700;padding:6px 12px;display:flex;justify-content:space-between;align-items:center}
.print-job-body{padding:10px 12px}
.print-job-loc{font-size:20px;font-weight:800;margin-bottom:8px;border-bottom:1px solid #ccc;padding-bottom:6px}
.print-job-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;margin-bottom:6px}
.print-job-field{font-size:13px;line-height:1.7}
.print-job-field b{font-weight:700;display:inline-block;min-width:80px}
.print-job-notes{background:#f5f5f5;border:1px solid #ddd;padding:8px 10px;font-size:13px;white-space:pre-wrap;margin-top:6px;line-height:1.5}
.print-job-notes b{display:block;font-weight:700;margin-bottom:3px}
.print-footer{margin-top:16px;padding-top:12px;border-top:2px solid #000;font-size:10px;color:#999;display:flex;justify-content:space-between}
.print-weekly-table{width:100%;border-collapse:collapse;font-size:12px}
.print-weekly-table th,.print-weekly-table td{border:2px solid #000;padding:8px;vertical-align:top;text-align:left}
.print-weekly-table th{background:#e5e5e5;font-weight:800;font-size:12px;text-transform:uppercase}
.print-weekly-table td{font-size:12px;line-height:1.4}
.print-no-jobs{text-align:center;padding:30px;font-size:14px;color:#999;font-style:italic}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

async function api(method, url, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  return (await fetch('/api'+url, opts)).json();
}

function weekStart(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));dt.setHours(0,0,0,0);return dt;}
function fmt(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtLong(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekDates(ws){return DAYS.map((_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d;});}

function App(){
  const [tab,setTab]=useState('schedule');
  const [data,setData]=useState(null);
  const [ws,setWs]=useState(()=>weekStart(new Date()));
  const [modal,setModal]=useState(null);
  const [eid,setEid]=useState(null);
  const [clip,setClip]=useState(null);
  const [conn,setConn]=useState(false);
  const [toast,setToast]=useState(null);
  const tt=useRef(null);
  const show=(m)=>{setToast(m);if(tt.current)clearTimeout(tt.current);tt.current=setTimeout(()=>setToast(null),3000);};

  useEffect(()=>{
    let es;
    function go(){
      es=new EventSource('/api/events');
      es.onopen=()=>setConn(true);
      es.onmessage=(e)=>{
        const m=JSON.parse(e.data);
        if(m.type==='connected'||m.type==='full-sync') setData(m.data);
        else if(m.type==='job-added'){setData(p=>p?{...p,jobs:[...p.jobs,m.job]}:p);show('Job added: '+(m.job.location||'New'));}
        else if(m.type==='job-updated') setData(p=>p?{...p,jobs:p.jobs.map(j=>j.id===m.job.id?m.job:j)}:p);
        else if(m.type==='job-deleted') setData(p=>p?{...p,jobs:p.jobs.filter(j=>j.id!==m.jobId)}:p);
      };
      es.onerror=()=>{setConn(false);es.close();setTimeout(go,3000);};
    }
    go();
    return()=>{if(es)es.close();};
  },[]);

  const dates=useMemo(()=>weekDates(ws),[ws]);
  const today=dk(new Date());
  const prev=()=>{const d=new Date(ws);d.setDate(d.getDate()-7);setWs(d);};
  const next=()=>{const d=new Date(ws);d.setDate(d.getDate()+7);setWs(d);};
  const now=()=>setWs(weekStart(new Date()));

  if(!data) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontSize:18,color:'#666'}}>Connecting to server...</div>;

  const cellJobs=(did,date)=>data.jobs.filter(j=>j.driverId===did&&j.date===dk(date));
  const cellConflict=(did,date)=>{
    const k=dk(date);const cj=data.jobs.filter(j=>j.driverId===did&&j.date===k);
    for(const j of cj){if(!j.truckId)continue;if(data.jobs.some(o=>o.date===k&&o.truckId===j.truckId&&o.id!==j.id))return true;}return false;
  };
  const dayConflicts=(date)=>{
    const k=dk(date);const dj=data.jobs.filter(j=>j.date===k&&j.truckId);
    const m={};dj.forEach(j=>{if(!m[j.truckId])m[j.truckId]=[];m[j.truckId].push(j);});
    const c=[];Object.entries(m).forEach(([tid,jobs])=>{if(jobs.length>1){const t=data.trucks.find(x=>x.id===tid);c.push({tn:t?.name||tid,jobs});}});return c;
  };

  return(
    <div>
      <div className="app-header">
        <h1>RouteBoard</h1>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>{document.body.classList.toggle('dark');}} style={{background:'rgba(255,255,255,.2)',color:'#fff',padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:600,border:'1px solid rgba(255,255,255,.3)'}}>{'\u263D'} Dark Mode</button>
          <span className={'conn-status '+(conn?'ok':'bad')}>{conn?'Live':'Reconnecting...'}</span>
        </div>
      </div>
      <div className="tabs">
        {[['schedule','Weekly Schedule'],['pickups','Job Requests'],['roster','People'],['fleet','Trucks & Trailers'],['routes','Route View'],['customers','Customers'],['docs','Documents']].map(([k,v])=>(
          <div key={k} className={'tab '+(tab===k?'on':'')} onClick={()=>setTab(k)}>{v}</div>
        ))}
      </div>
      <div className="main">
        {tab==='schedule'&&<Schedule {...{data,ws,dates,today,cellJobs,cellConflict,dayConflicts,prev,next,now,modal,setModal,eid,setEid,clip,setClip,show}}/>}
        {tab==='pickups'&&<Pickups data={data}/>}
        {tab==='roster'&&<Roster data={data}/>}
        {tab==='fleet'&&<Fleet data={data}/>}
        {tab==='routes'&&<Routes data={data} dates={dates} ws={ws} prev={prev} next={next} now={now}/>}
        {tab==='customers'&&<Customers data={data}/>}
        {tab==='docs'&&<Documents/>}
      </div>
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

const HAZARD_CLASSES=['Class 1 - Explosives','Class 2 - Gases','Class 2.1 - Flammable Gas','Class 2.2 - Non-Flammable Gas','Class 2.3 - Poison Gas','Class 3 - Flammable','Class 4 - Flammable Solid','Class 4.1 - Flammable Solid','Class 4.2 - Spontaneously Combustible','Class 4.3 - Dangerous When Wet','Class 5.1 - Oxidizer','Class 5.2 - Organic Peroxide','Class 6 - Poison/Toxic','Class 6.1 - Poison','Class 6.2 - Infectious Substance','Class 7 - Radioactive','Class 8 - Corrosive','Class 9 - Miscellaneous','DANGEROUS'];

const PLACARD_LIST=[
  {cat:'Class 3 - Flammable',items:['1203 Class 3 Flammable','1993 Class 3 Flammable','1263 Class 3 Flammable','1999 Class 3 Flammable','1170 Class 3 Flammable','1294 Class 3 Flammable','1230 Class 3 Flammable','2059 Class 3 Flammable','1987 Class 3 Flammable','1268 Class 3 Flammable']},
  {cat:'Class 8 - Corrosive',items:['1830 Class 8 Corrosive','1824 Class 8 Corrosive','3266 Class 8 Corrosive','3264 Class 8 Corrosive','2031 Class 8 Corrosive','2032 Class 8 Corrosive','1789 Class 8 Corrosive','2794 Class 8 Corrosive','2795 Class 8 Corrosive','1805 Class 8 Corrosive','1760 Class 8 Corrosive','1759 Class 8 Corrosive']},
  {cat:'Class 6 - Poison/Toxic',items:['2810 Class 6 Poison','2811 Class 6 Poison','1851 Class 6 Poison','2927 Class 6 Poison','3287 Class 6 Poison','1583 Class 6 Poison','1556 Class 6 Poison','1600 Class 6 Poison','3288 Class 6 Poison']},
  {cat:'Class 9 - Miscellaneous',items:['3077 Class 9 Misc','3082 Class 9 Misc','3257 Class 9 Misc','3334 Class 9 Misc','3509 Class 9 Misc']},
  {cat:'Class 4 - Flammable Solid',items:['1325 Class 4 Flammable Solid','2926 Class 4 Flammable Solid','1383 Class 4 Flammable Solid','2006 Class 4 Flammable Solid','3175 Class 4 Flammable Solid','3178 Class 4 Flammable Solid']},
  {cat:'Class 5 - Oxidizer',items:['1479 Class 5 Oxidizer','2014 Class 5 Oxidizer','1942 Class 5 Oxidizer','3085 Class 5 Oxidizer','3098 Class 5 Oxidizer','2015 Class 5 Oxidizer']},
  {cat:'Class 2 - Gases',items:['1075 Class 2 Gas','1971 Class 2 Gas','1978 Class 2 Gas','1005 Class 2 Gas','1017 Class 2 Gas','1072 Class 2 Gas','2187 Class 2 Gas','1049 Class 2 Gas']},
  {cat:'Class 1 - Explosives',items:['0331 Class 1 Explosive','0332 Class 1 Explosive','0081 Class 1 Explosive']},
  {cat:'Class 7 - Radioactive',items:['2982 Class 7 Radioactive','2910 Class 7 Radioactive','3321 Class 7 Radioactive']}
];

function Schedule({data,ws,dates,today,cellJobs,cellConflict,dayConflicts,prev,next,now,modal,setModal,eid,setEid,clip,setClip,show}){
  const end=new Date(ws);end.setDate(end.getDate()+6);
  const [showPlacards,setShowPlacards]=useState(null); /* null or customer id */
  const [custSearch,setCustSearch]=useState('');
  const [custDropOpen,setCustDropOpen]=useState(false);
  const openAdd=(did,date)=>{setEid(null);if(clip){setModal({...clip,driverId:did,date:dk(date)});}else{setModal({driverId:did,date:dk(date),location:'',customerIds:[],truckId:'',trailerId:'',timeWindow:'',equipment:[],notes:'',status:'Scheduled'});}};
  const getCustEntries=()=>(modal.customerIds||[]).map(x=>typeof x==='string'?{id:x,jobNotes:''}:x);
  const copyJob=()=>{if(!modal)return;const c={location:modal.location,customerIds:getCustEntries().map(x=>({...x})),truckId:modal.truckId,trailerId:modal.trailerId,timeWindow:modal.timeWindow,equipment:[...(modal.equipment||[])],placards:[...(modal.placards||[])],notes:modal.notes,status:modal.status||'Scheduled'};setClip(c);setModal(null);setEid(null);if(show)show('Job copied! Click any cell to paste.');};
  const clearClip=()=>{setClip(null);if(show)show('Clipboard cleared.');};
  const openEdit=(job,e)=>{e.stopPropagation();setEid(job.id);setModal({...job,customerIds:job.customerIds||[]});setCustSearch('');setCustDropOpen(false);};
  const save=async()=>{if(eid){if(!confirm('Are you sure you want to update this job?'))return;await api('PUT','/jobs/'+eid,modal);}else{await api('POST','/jobs',modal);}setModal(null);setEid(null);};
  const del=async(id,e)=>{if(e)e.stopPropagation();await api('DELETE','/jobs/'+id);};
  const moveDriver=async(idx,dir)=>{
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=data.drivers.length)return;
    const ids=data.drivers.map(d=>d.id);

      <button onClick={next}>Next &#9654;</button>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:8,flexWrap:'wrap',alignItems:'center',fontSize:11}}>

      <span style={{background:'#fca5a5',padding:'2px 8px',borderRadius:4,fontWeight:600}}>Coast</span>
      <span style={{background:'#fed7aa',padding:'2px 8px',borderRadius:4,fontWeight:600}}>Vac</span>
      <span style={{background:'#e9d5ff',padding:'2px 8px',borderRadius:4,fontWeight:600}}>Roll Off</span>
      <span style={{background:'#fce7f3',padding:'2px 8px',borderRadius:4,fontWeight:600}}>EWS / LA TSDF / PRR / USE</span>
      <span style={{background:'#dcfce7',padding:'2px 8px',borderRadius:4,fontWeight:600}}>Custom</span>
    </div>
    {clip&&<div style={{background:'#7c3aed',color:'#fff',padding:'8px 16px',borderRadius:8,marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:13}}>

    </tr></thead><tbody>
      {data.drivers.map((driver,dIdx)=>(<tr key={driver.id}><td><div style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{display:'flex',flexDirection:'column',gap:1}}>

              <span onClick={()=>moveDriver(dIdx,1)} style={{cursor:dIdx<data.drivers.length-1?'pointer':'default',opacity:dIdx<data.drivers.length-1?1:0.2,fontSize:10,lineHeight:1,userSelect:'none'}}>&#9660;</span>
            </div>
            <div>{driver.name}<div style={{fontSize:10,color:'var(--text-muted)',fontWeight:400}}>{driver.role}</div></div>
          </div></td>
        {dates.map((date,i)=>{
          const jobs=cellJobs(driver.id,date);const conf=cellConflict(driver.id,date);const ist=dk(date)===today;
          return(<td key={i}><div className={'cell'+(conf?' conflict':'')+(ist?' today':'')} onClick={()=>openAdd(driver.id,date)}>
            {conf&&<div className="cbadge">TRUCK CONFLICT</div>}
            {jobs.map(job=>{
              const truck=data.trucks.find(t=>t.id===job.truckId);const trailer=data.trailers.find(t=>t.id===job.trailerId);
              const sc=job.status?(job.status.toLowerCase().replace(/\s/g,'')):'';
              const loc=(job.location||'').trim().toLowerCase();
              const pinkLocs=['ews','la tsdf','prr','use'];
              const locColor=loc==='coast'?'#fca5a5':loc==='vac'?'#fed7aa':loc==='roll off'?'#e9d5ff':pinkLocs.includes(loc)?'#fce7f3':(job.location&&!(data.locations||[]).some(l=>l===job.location))?'#dcfce7':null;
              return(<div key={job.id} className={'chip '+sc} style={locColor?{background:locColor}:{}} onClick={e=>openEdit(job,e)}>
                {job.location&&<div className="loc">{job.location}</div>}
                {truck&&<div className="trk">{truck.name}</div>}
                {trailer&&<div className="trk">{trailer.name}</div>}
                {job.timeWindow&&<div className="tm">{job.timeWindow}</div>}
                {job.equipment&&job.equipment.length>0&&<div style={{fontSize:9,color:'#888'}}>{job.equipment.join(', ')}</div>}
                {job.notes&&<div style={{fontSize:10,color:'#666',marginTop:1}}>{job.notes.length>50?job.notes.slice(0,50)+'...':job.notes}</div>}
                <span className="x" onClick={e=>{e.stopPropagation();del(job.id);}}>&#10005;</span>

            {jobs.length>0&&<div style={{color:'var(--primary)',fontSize:10,textAlign:'center',marginTop:4,cursor:'pointer',fontWeight:600}} onClick={e=>{e.stopPropagation();openAdd(driver.id,date);}}>+</div>}

      </tr>))}
    </tbody></table></div>

    {dates.map((date,i)=>{const c=dayConflicts(date);if(!c.length)return null;
      return(<div key={i} style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:10,margin:'8px 0',fontSize:12}}>
        <strong style={{color:'var(--danger)'}}>Conflicts on {DAYS[i]} {date.getMonth()+1}/{date.getDate()}:</strong>
        {c.map((x,j)=>(<div key={j} style={{marginTop:4}}>{x.tn} assigned to: {x.jobs.map(j2=>data.drivers.find(d=>d.id===j2.driverId)?.name).join(', ')}</div>))}
      </div>);
    })}

    {modal&&(<div className="overlay" onClick={()=>{setModal(null);setEid(null);}}>

        </div>

          <select value={modal.driverId} onChange={e=>setModal({...modal,driverId:e.target.value})}>

              const allCust=(data.customers||[]).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
              const entries=getCustEntries();
              const selectedIds=entries.map(x=>x.id);
              const filtered=custSearch?allCust.filter(c=>(c.name||'').toLowerCase().includes(custSearch.toLowerCase())):allCust;
              return filtered.length>0?<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #ccc',borderRadius:6,maxHeight:200,overflowY:'auto',zIndex:100,boxShadow:'0 4px 12px rgba(0,0,0,.15)'}}>
                {filtered.map(c=><div key={c.id} onClick={()=>{if(!selectedIds.includes(c.id)){setModal({...modal,customerIds:[...entries,{id:c.id,jobNotes:''}]});}setCustSearch('');setCustDropOpen(false);}} style={{padding:'8px 12px',cursor:'pointer',fontSize:13,background:selectedIds.includes(c.id)?'#dbeafe':'#fff',borderBottom:'1px solid #f0f0f0'}} onMouseEnter={e=>e.target.style.background='#eff6ff'} onMouseLeave={e=>e.target.style.background=selectedIds.includes(c.id)?'#dbeafe':'#fff'}>
                  <strong>{c.name}</strong>{c.city?<span style={{color:'#666',marginLeft:6,fontSize:12}}>{c.city}{c.state?', '+c.state:''}</span>:null}
                  {selectedIds.includes(c.id)&&<span style={{float:'right',color:'#2563eb',fontSize:11}}>selected</span>}
                </div>)}
              </div>:null;
            })()}
          </div>
          {getCustEntries().length>0&&<div style={{marginTop:6}}>{getCustEntries().map((entry,idx)=>{const c=(data.customers||[]).find(x=>x.id===entry.id);const ep=entry.placards||[];const eeq=entry.equipment||[];return c?<div key={entry.id} style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:6,padding:10,marginBottom:6,fontSize:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <strong style={{fontSize:13}}>{c.name}</strong>
              <span onClick={()=>{const updated=getCustEntries().filter(x=>x.id!==entry.id);setModal({...modal,customerIds:updated});}} style={{cursor:'pointer',color:'#dc2626',fontWeight:700,fontSize:14,padding:'0 4px'}}>&times;</span>
            </div>
            {c.address&&<div><strong>Address:</strong> {c.address}{c.city?', '+c.city:''}{c.state?' '+c.state:''} {c.zip}</div>}
            {c.phone&&<div><strong>Phone:</strong> {c.phone}</div>}
            {c.contact&&<div><strong>Contact:</strong> {c.contact}</div>}
            {(c.pricing||c.notes)&&<div><strong>Pricing/Notes:</strong> {c.pricing||c.notes}</div>}
            <div style={{marginTop:6}}><label style={{fontSize:11,fontWeight:700,color:'#333'}}>Time Window:</label>
              <input value={entry.timeWindow||''} onChange={e=>{const updated=getCustEntries().map(x=>x.id===entry.id?{...x,timeWindow:e.target.value}:x);setModal({...modal,customerIds:updated});}} placeholder="e.g. 8:00 AM, Be onsite by 10 AM" style={{width:'100%',marginTop:2,fontSize:12,padding:4,borderRadius:4,border:'1px solid #ccc'}}/></div>
            <div style={{marginTop:4}}><label style={{fontSize:11,fontWeight:700,color:'#333'}}>Equipment:</label>
              <div style={{marginTop:2}}>{data.equipment.filter(eq=>eq!=='Placards').map(eq=>(<span key={eq} style={{display:'inline-block',marginRight:10,marginBottom:3}}>
                <label style={{fontSize:11,cursor:'pointer'}}>
                <input type="checkbox" checked={eeq.includes(eq)} style={{marginRight:3,width:'auto'}}
                  onChange={e=>{const updated=getCustEntries().map(x=>x.id===entry.id?{...x,equipment:e.target.checked?[...eeq,eq]:eeq.filter(z=>z!==eq)}:x);setModal({...modal,customerIds:updated});}}/>
                {eq}</label></span>))}</div></div>
            <div style={{marginTop:4,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <button onClick={()=>setShowPlacards(entry.id)} style={{background:'#d97706',color:'#fff',border:'none',padding:'3px 10px',borderRadius:4,fontSize:11,cursor:'pointer',fontWeight:600}}>Placards ({ep.length})</button>
              {ep.length>0&&ep.map(p=><span key={p} style={{display:'inline-block',background:'#fef3c7',border:'1px solid #d97706',borderRadius:4,padding:'1px 6px',fontSize:10,fontWeight:600}}>{p}</span>)}
            </div>
            <div style={{marginTop:6}}><label style={{fontSize:12,fontWeight:700,color:'#1d4ed8'}}>Job Notes for {c.name}:</label>
              <textarea value={entry.jobNotes||''} onChange={e=>{const updated=getCustEntries().map(x=>x.id===entry.id?{...x,jobNotes:e.target.value}:x);setModal({...modal,customerIds:updated});}} rows={2} placeholder="Special instructions, requirements for this customer..." style={{width:'100%',marginTop:3,fontSize:12,padding:6,borderRadius:4,border:'1px solid #93c5fd'}}/></div>
          </div>:null;})}</div>}
        </div>
        <div className="mrow"><label>Truck</label>
          <select value={modal.truckId} onChange={e=>setModal({...modal,truckId:e.target.value})}>
            <option value="">-- None --</option>
            {data.trucks.filter(t=>t.status==='Active').map(t=><option key={t.id} value={t.id}>{t.name} ({t.type})</option>)}
          </select></div>
        <div className="mrow"><label>Trailer</label>
          <select value={modal.trailerId} onChange={e=>setModal({...modal,trailerId:e.target.value})}>
            <option value="">-- None --</option>
            {data.trailers.map(t=><option key={t.id} value={t.id}>{t.name} ({t.type})</option>)}
          </select></div>
        {showPlacards&&(()=>{const pcid=showPlacards;const pEntry=getCustEntries().find(x=>x.id===pcid);const pCust=(data.customers||[]).find(x=>x.id===pcid);const curPl=pEntry?pEntry.placards||[]:[];
          const togglePl=(p)=>{const updated=getCustEntries().map(x=>x.id===pcid?{...x,placards:curPl.includes(p)?curPl.filter(z=>z!==p):[...curPl,p]}:x);setModal({...modal,customerIds:updated});};
          return <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setShowPlacards(null)}>
          <div style={{background:'#fff',borderRadius:12,padding:20,width:600,maxWidth:'95vw',maxHeight:'80vh',overflowY:'auto',boxShadow:'0 8px 30px rgba(0,0,0,.3)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <h3 style={{fontSize:16,fontWeight:700}}>Placards for {pCust?pCust.name:''}</h3>
              <button className="bc" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>setShowPlacards(null)}>Done</button>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:'#b45309',marginBottom:4,borderBottom:'2px solid #d97706',paddingBottom:3}}>Hazard Class Placards (no UN number)</div>
              <div>{HAZARD_CLASSES.map(hc=>(<div key={hc} style={{display:'inline-block',marginRight:10,marginBottom:4}}>
                <label style={{fontSize:12,cursor:'pointer',fontWeight:curPl.includes(hc)?600:400}}>
                  <input type="checkbox" checked={curPl.includes(hc)} style={{marginRight:3,width:'auto'}}
                    onChange={()=>togglePl(hc)}/>
                  {hc}
                </label></div>))}</div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text-muted)',marginBottom:8,marginTop:8}}>&#9660; 4-Digit UN Number Placards</div>
            {PLACARD_LIST.map(grp=>(<div key={grp.cat} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--primary)',marginBottom:4,borderBottom:'1px solid var(--border)',paddingBottom:3}}>{grp.cat}</div>
              <div>{grp.items.map(p=>(<div key={p} style={{display:'inline-block',marginRight:10,marginBottom:4}}>
                <label style={{fontSize:12,cursor:'pointer',fontWeight:curPl.includes(p)?600:400}}>
                  <input type="checkbox" checked={curPl.includes(p)} style={{marginRight:3,width:'auto'}}
                    onChange={()=>togglePl(p)}/>
                  {p}
                </label></div>))}</div>
            </div>))}
          </div>
        </div>;})()}
        <div className="mrow"><label>Status</label>
          <select value={modal.status||'Scheduled'} onChange={e=>setModal({...modal,status:e.target.value})}>
            <option>Scheduled</option><option>Tentative</option><option>Confirmed</option><option>Off</option><option>OOO</option>
          </select></div>
        <div className="mrow"><label>Notes</label>
          <textarea value={modal.notes} onChange={e=>setModal({...modal,notes:e.target.value})} rows={3} placeholder="Special instructions, reference numbers, etc."/></div>
        <div className="mactions">
          <button className="bc" onClick={()=>{setModal(null);setEid(null);}}>Cancel</button>
          {eid&&<button className="bd" onClick={async()=>{await del(eid);setModal(null);setEid(null);}}>Delete</button>}
          <button style={{background:'#7c3aed',color:'#fff'}} onClick={copyJob}>Copy Job</button>
          <button onClick={()=>{
            const entries=getCustEntries();
            const custs=entries.map(entry=>{const c=(data.customers||[]).find(x=>x.id===entry.id);return c?{name:c.name,address:[c.address,c.city,c.state,c.zip].filter(Boolean).join(', '),phone:c.phone||'',contact:c.contact||'',pricing:c.pricing||c.notes||'',jobNotes:entry.jobNotes||'',timeWindow:entry.timeWindow||'',equipment:(entry.equipment||[]).join(', ')||'None',placards:(entry.placards||[]).join(', ')||'None'}:null;}).filter(Boolean);
            const jobData={
              date:modal.date?(modal.date.split('-')[1]+'/'+modal.date.split('-')[2]+'/'+modal.date.split('-')[0]):'',
              driver:(data.drivers.find(d=>d.id===modal.driverId)||{}).name||'',
              location:modal.location||'',
              truck:(data.trucks.find(t=>t.id===modal.truckId)||{}).name||'None',
              trailer:(data.trailers.find(t=>t.id===modal.trailerId)||{}).name||'None',
              status:modal.status||'Scheduled',
              notes:modal.notes||'',
              customers:custs
            };
            const f=document.createElement('form');f.method='POST';f.action='/print-job';f.target='_blank';
            const inp=document.createElement('input');inp.type='hidden';inp.name='jobData';inp.value=JSON.stringify(jobData);
            f.appendChild(inp);document.body.appendChild(f);f.submit();document.body.removeChild(f);
          }} style={{background:'#475569',color:'#fff',padding:'6px 14px',borderRadius:6,fontSize:13,border:'none',cursor:'pointer'}}>Print Job</button>
          <button className="bp" onClick={save}>{eid?'Update':'Add Job'}</button>
        </div>
      </div>
    </div>)}
  </div>);
}

function Roster({data}){
  const [name,setName]=useState('');
  const [role,setRole]=useState('Driver');
  const [editing,setEditing]=useState(null);
  const [en,setEn]=useState('');
  const add=async()=>{if(!name.trim())return;await api('POST','/drivers',{name:name.trim(),role,skills:[]});setName('');};
  const remove=async(d)=>{if(confirm('Remove '+d.name+'? This also removes their scheduled jobs.'))await api('DELETE','/drivers/'+d.id);};
  const rename=async(d)=>{if(en.trim())await api('PUT','/drivers/'+d.id,{name:en.trim()});setEditing(null);};
  return(<div>
    <div className="stitle">Add Person</div>
    <div className="addrow">
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="Name" onKeyDown={e=>e.key==='Enter'&&add()}/>
      <select value={role} onChange={e=>setRole(e.target.value)} style={{maxWidth:160}}>
        <option>Driver</option><option>Tech</option><option>Warehouse</option><option>Sales/Driver</option>
      </select>
      <button className="bp" onClick={add}>Add</button>
    </div>
    <div className="stitle">Current Roster ({data.drivers.length})</div>
    <div className="cards">
      {data.drivers.map(d=>(<div key={d.id} className="card">
        <div style={{flex:1}}>
          {editing===d.id?(<div style={{display:'flex',gap:4,alignItems:'center'}}>
            <input className="ied" value={en} onChange={e=>setEn(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')rename(d);if(e.key==='Escape')setEditing(null);}} autoFocus/>
            <button className="bp" style={{padding:'3px 8px',fontSize:11}} onClick={()=>rename(d)}>Save</button>
            <button className="bc" style={{padding:'3px 8px',fontSize:11}} onClick={()=>setEditing(null)}>Cancel</button>
          </div>):(<div className="nm">{d.name} <button className="ebtn" onClick={()=>{setEditing(d.id);setEn(d.name);}}>Rename</button></div>)}
          <select value={d.role} onChange={e=>api('PUT','/drivers/'+d.id,{role:e.target.value})} style={{width:'auto',padding:'2px 6px',fontSize:11,marginTop:4}}>
            <option>Driver</option><option>Tech</option><option>Warehouse</option><option>Sales/Driver</option>
          </select>
        </div>
        <div className="acts"><button style={{background:'#fee2e2',color:'var(--danger)'}} onClick={()=>remove(d)}>Remove</button></div>
      </div>))}
    </div>
  </div>);
}

function Fleet({data}){
  const [tn,setTn]=useState('');const [tt,setTt]=useState('Standard');
  const [trn,setTrn]=useState('');const [trt,setTrt]=useState('Standard');
  const [eq,setEq]=useState('');
  const [newLoc,setNewLoc]=useState('');
  const [editingLoc,setEditingLoc]=useState(null);
  const [editLocName,setEditLocName]=useState('');
  const [editing,setEditing]=useState(null);
  const [en,setEn]=useState('');
  const renameTruck=async(t)=>{if(en.trim())await api('PUT','/trucks/'+t.id,{name:en.trim()});setEditing(null);};
  const renameTrailer=async(t)=>{if(en.trim())await api('PUT','/trailers/'+t.id,{name:en.trim()});setEditing(null);};

  return(<div>
    <div className="stitle">Add Truck</div>
    <div className="addrow">
      <input value={tn} onChange={e=>setTn(e.target.value)} placeholder="Truck name/number (e.g. Unit 401)"/>
      <select value={tt} onChange={e=>setTt(e.target.value)} style={{maxWidth:160}}>
        <option>Standard</option><option>Flatbed</option><option>Vac Truck</option><option>Tanker</option><option>Box Truck</option>
      </select>
      <button className="bp" onClick={async()=>{if(tn.trim()){await api('POST','/trucks',{name:tn.trim(),type:tt,status:'Active'});setTn('');}}}>Add</button>
    </div>
    <div className="stitle">Trucks ({data.trucks.length})</div>
    <div className="cards">
      {data.trucks.map(t=>(<div key={t.id} className="card">
        <div style={{flex:1}}>
          {editing===t.id?(<div style={{display:'flex',gap:4,alignItems:'center'}}>
            <input className="ied" value={en} onChange={e=>setEn(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')renameTruck(t);if(e.key==='Escape')setEditing(null);}} autoFocus/>
            <button className="bp" style={{padding:'3px 8px',fontSize:11}} onClick={()=>renameTruck(t)}>Save</button>
            <button className="bc" style={{padding:'3px 8px',fontSize:11}} onClick={()=>setEditing(null)}>Cancel</button>
          </div>):(<div className="nm">{t.name} <button className="ebtn" onClick={()=>{setEditing(t.id);setEn(t.name);}}>Rename</button></div>)}
          <div style={{marginTop:2}}>

          <button style={{background:'#fee2e2',color:'var(--danger)'}} onClick={async()=>{if(confirm('Remove '+t.name+'?'))await api('DELETE','/trucks/'+t.id);}}>Remove</button>
        </div>

        <option>Standard</option><option>Flatbed</option><option>Tanker</option><option>Enclosed</option><option>Dump</option>
      </select>
      <button className="bp" onClick={async()=>{if(trn.trim()){await api('POST','/trailers',{name:trn.trim(),type:trt});setTrn('');}}}>Add</button>
    </div>
    <div className="stitle">Trailers ({data.trailers.length})</div>
    <div className="cards">
      {data.trailers.map(t=>(<div key={t.id} className="card">
        <div style={{flex:1}}>
          {editing===t.id?(<div style={{display:'flex',gap:4,alignItems:'center'}}>
            <input className="ied" value={en} onChange={e=>setEn(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')renameTrailer(t);if(e.key==='Escape')setEditing(null);}} autoFocus/>
            <button className="bp" style={{padding:'3px 8px',fontSize:11}} onClick={()=>renameTrailer(t)}>Save</button>
            <button className="bc" style={{padding:'3px 8px',fontSize:11}} onClick={()=>setEditing(null)}>Cancel</button>
          </div>):(<div className="nm">{t.name} <button className="ebtn" onClick={()=>{setEditing(t.id);setEn(t.name);}}>Rename</button></div>)}
          <select value={t.type} onChange={e=>api('PUT','/trailers/'+t.id,{type:e.target.value})} style={{width:'auto',padding:'2px 6px',fontSize:11,marginTop:2}}>
            <option>Standard</option><option>Flatbed</option><option>Tanker</option><option>Enclosed</option><option>Dump</option>
          </select>
        </div>
        <div className="acts"><button style={{background:'#fee2e2',color:'var(--danger)'}} onClick={async()=>{if(confirm('Remove '+t.name+'?'))await api('DELETE','/trailers/'+t.id);}}>Remove</button></div>
      </div>))}
    </div>

    <div className="stitle" style={{marginTop:28}}>Equipment Types</div>
    <div className="addrow">
      <input value={eq} onChange={e=>setEq(e.target.value)} placeholder="New equipment type" onKeyDown={async e=>{if(e.key==='Enter'&&eq.trim()){await api('POST','/equipment',{name:eq.trim()});setEq('');}}}/>
      <button className="bp" onClick={async()=>{if(eq.trim()){await api('POST','/equipment',{name:eq.trim()});setEq('');}}}>Add</button>
    </div>
    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
      {data.equipment.map((e,i)=>(<span key={i} style={{background:'#eef2ff',padding:'4px 10px',borderRadius:6,fontSize:12,display:'flex',alignItems:'center',gap:6}}>
        {e}<span style={{cursor:'pointer',color:'#999',fontSize:10}} onClick={()=>api('DELETE','/equipment/'+encodeURIComponent(e))}>&#10005;</span>
      </span>))}
    </div>

    <div className="stitle" style={{marginTop:28}}>Saved Locations / Routes</div>
    <div className="addrow">
      <input value={newLoc} onChange={e=>setNewLoc(e.target.value)} placeholder="New location (e.g. Brenntag Fresno)" onKeyDown={async e=>{if(e.key==='Enter'&&newLoc.trim()){await api('POST','/locations',{name:newLoc.trim()});setNewLoc('');}}}/>
      <button className="bp" onClick={async()=>{if(newLoc.trim()){await api('POST','/locations',{name:newLoc.trim()});setNewLoc('');}}}>Add</button>
    </div>
    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
      {(data.locations||[]).map((loc,i)=>(<span key={i} style={{background:'#f0fdf4',border:'1px solid #86efac',padding:'4px 10px',borderRadius:6,fontSize:12,display:'flex',alignItems:'center',gap:6}}>
        {editingLoc===loc?(<span style={{display:'flex',gap:3,alignItems:'center'}}>
          <input className="ied" value={editLocName} onChange={e=>setEditLocName(e.target.value)} style={{width:120,fontSize:11}}
            onKeyDown={async e=>{if(e.key==='Enter'&&editLocName.trim()){await api('PUT','/locations',{oldName:loc,newName:editLocName.trim()});setEditingLoc(null);}if(e.key==='Escape')setEditingLoc(null);}} autoFocus/>
          <button className="bp" style={{padding:'2px 6px',fontSize:10}} onClick={async()=>{if(editLocName.trim()){await api('PUT','/locations',{oldName:loc,newName:editLocName.trim()});setEditingLoc(null);}}}>OK</button>
        </span>):(<span>
          {loc}
          <span style={{cursor:'pointer',color:'var(--primary)',fontSize:10,marginLeft:2}} onClick={()=>{setEditingLoc(loc);setEditLocName(loc);}}>edit</span>
          <span style={{cursor:'pointer',color:'#999',fontSize:10}} onClick={()=>api('DELETE','/locations/'+encodeURIComponent(loc))}>&#10005;</span>
        </span>)}
      </span>))}
    </div>
  </div>);
}

function Routes({data,dates,ws,prev,next,now}){
  const end=new Date(ws);end.setDate(end.getDate()+6);
  const today=dk(new Date());
  const driverJobs=(driverId,date)=>{
    const k=dk(date);
    return data.jobs.filter(j=>j.driverId===driverId&&j.date===k&&j.location).map(j=>({
      loc:j.location,
      truck:data.trucks.find(t=>t.id===j.truckId)?.name
    }));
  };
  return(<div>
    <div className="week-nav">
      <button onClick={prev}>&#9664; Prev</button>
      <button onClick={now} style={{background:'#16a34a'}}>Today</button>
      <div className="week-label">{fmt(ws)} &mdash; {fmt(end)}</div>
      <button onClick={next}>Next &#9654;</button>
    </div>
    <div className="grid"><table><thead><tr><th>Person</th>
      {dates.map((d,i)=>(<th key={i} style={dk(d)===today?{background:'#fffbeb'}:{}}>{DAYS[i]}<br/><span style={{fontWeight:400,fontSize:11}}>{d.getMonth()+1}/{d.getDate()}</span></th>))}
    </tr></thead><tbody>
      {data.drivers.map(driver=>(<tr key={driver.id}>
        <td><div>{driver.name}<div style={{fontSize:10,color:'var(--text-muted)',fontWeight:400}}>{driver.role}</div></div></td>
        {dates.map((date,i)=>{
          const jobs=driverJobs(driver.id,date);const ist=dk(date)===today;
          return(<td key={i}><div className={'cell'+(ist?' today':'')} style={{minHeight:40}}>
            {jobs.map((item,j)=>(<div key={j} className="rtag" style={{marginBottom:3,display:'block'}}>{item.loc}{item.truck?' ('+item.truck+')':''}</div>))}
          </div></td>);
        })}
      </tr>))}
    </tbody></table></div>
  </div>);
}

/* ============ CUSTOMERS ============ */
function Customers({data}){
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState('');
  const empty={name:'',address:'',city:'',state:'',zip:'',phone:'',email:'',contact:'',pricing:'',notes:''};
  const [form,setForm]=useState(empty);

  const openAdd=()=>{setEditId(null);setForm(empty);setShowForm(true);};
  const openEdit=(c)=>{setEditId(c.id);setForm({name:c.name||'',address:c.address||'',city:c.city||'',state:c.state||'',zip:c.zip||'',phone:c.phone||'',email:c.email||'',contact:c.contact||'',pricing:c.pricing||'',notes:c.notes||''});setShowForm(true);};
  const save=async()=>{
    if(!form.name.trim()){alert('Customer name is required');return;}
    if(editId){await api('PUT','/customers/'+editId,form);}
    else{await api('POST','/customers',form);}
    setShowForm(false);setEditId(null);setForm(empty);
  };
  const del=async(id,name)=>{if(!confirm('Delete "'+name+'"?'))return;await api('DELETE','/customers/'+id);};
  const deleteAll=async()=>{const count=(data.customers||[]).length;if(!count){alert('No customers to delete.');return;}if(!confirm('Are you sure you want to delete ALL '+count+' customers? This cannot be undone.')){return;}if(!confirm('FINAL WARNING: This will permanently delete all '+count+' customers. Continue?')){return;}await api('DELETE','/customers');setSearch('');};
  const importRef=useRef(null);
  const [importing,setImporting]=useState(false);
  const [importPreview,setImportPreview]=useState(null);

  const matchCol=(headers,options)=>{
    for(let i=0;i<headers.length;i++){
      const h=headers[i].toLowerCase().replace(/[^a-z0-9]/g,'');
      for(const opt of options){if(h.includes(opt))return i;}
    }
    return -1;
  };

  const parseFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setImporting(true);
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const allRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(allRows.length<2){alert('File appears empty or has no data rows.');setImporting(false);return;}

      /* Find real header row - QuickBooks puts title rows before actual headers */
      let headerRow=0;
      for(let i=0;i<Math.min(allRows.length,10);i++){
        const row=allRows[i];
        const vals=row.filter(v=>v&&String(v).trim());
        if(vals.length>=2){
          const joined=row.map(v=>String(v||'').toLowerCase()).join(' ');
          if(joined.includes('customer')||joined.includes('phone')||joined.includes('address')){headerRow=i;break;}
        }
      }
      const headers=allRows[headerRow].map(h=>String(h||''));
      const rows=allRows.slice(headerRow+1);

      const nameIdx=matchCol(headers,['customerfullname','customername','customer','company','name','companyname','displayname','fullname']);
      const addrIdx=matchCol(headers,['billaddress','billingaddress','billingstreet','billstreet','street','address','shippingstreet','address1','shipaddress']);
      const cityIdx=matchCol(headers,['city','billingcity','shippingcity']);
      const stateIdx=matchCol(headers,['state','province','billingstate','shippingstate']);
      const zipIdx=matchCol(headers,['zip','postal','billingzip','shippingzip','zipcode','postalcode']);
      const phoneIdx=matchCol(headers,['phone','phonenumbers','telephone','mainphone','workphone','primaryphone']);
      const emailIdx=matchCol(headers,['email','emailaddress','mainemail']);
      const contactIdx=matchCol(headers,['contact','contactname','firstname','primarycontact']);
      const notesIdx=matchCol(headers,['note','notes','memo','comment','description']);

      if(nameIdx===-1){alert('Could not find a Customer Name column. Headers found: '+headers.join(', '));setImporting(false);return;}

      /* Parse combined address like "123 Main St Fresno CA 93702" into parts */
      const parseAddr=(str)=>{
        if(!str)return{address:'',city:'',state:'',zip:''};
        str=str.trim();
        const zipM=str.match(/\s(\d{5}(?:-\d{4})?)$/);
        const zip=zipM?zipM[1]:'';
        if(zipM)str=str.slice(0,zipM.index).trim();
        const stM=str.match(/\s([A-Z]{2}|California|Texas|Nevada|Arizona|Oregon|Washington|Colorado|Utah)$/i);
        let state='';
        if(stM){
          state=stM[1];
          const ab={california:'CA',texas:'TX',nevada:'NV',arizona:'AZ',oregon:'OR',washington:'WA',colorado:'CO',utah:'UT'};
          if(stM[1].length>2&&ab[stM[1].toLowerCase()])state=ab[stM[1].toLowerCase()];
          else state=stM[1].toUpperCase();
          str=str.slice(0,stM.index).trim();
        }
        /* Split remaining into address + city */
        let address=str,city='';
        const knownCities=['fresno','clovis','visalia','madera','hanford','tulare','bakersfield','sacramento','stockton','modesto','merced','los angeles','san francisco','san jose','san diego','san mateo','union city','las vegas','los banos','selma','reedley','dinuba','sanger','kingsburg','parlier','fowler','kerman','coalinga','lemoore','porterville','delano','wasco','shafter','arvin','tehachapi','ridgecrest','manteca','tracy','turlock','atwater','chowchilla','exeter','lindsay','woodlake','orange cove','mendota','firebaugh','gustine','newman','patterson','riverbank','oakdale','escalon','ripon','lathrop','livingston','dos palos','south dos palos','huron','avenal','corcoran','west fresno','north fresno','east fresno','southeast fresno','southwest fresno','tower district'];
        const lower=str.toLowerCase();
        let found='';
        for(const c of knownCities){if(lower.endsWith(' '+c)||lower===c){found=c;break;}}
        if(found){city=str.slice(str.length-found.length);address=str.slice(0,str.length-found.length).trim();}
        return{address,city,state,zip};
      };

      const cleanPhone=(p)=>{if(!p)return '';return String(p).replace(/^Phone:\s*/i,'').replace(/^Phone\s*/i,'').trim();};

      const parsed=[];
      for(let i=0;i<rows.length;i++){
        const r=rows[i];const name=String(r[nameIdx]||'').trim();
        if(!name)continue;
        const rawAddr=addrIdx>=0?String(r[addrIdx]||'').trim():'';
        const hasSepateCols=cityIdx>=0;
        const addrParts=hasSepateCols?null:parseAddr(rawAddr);

        parsed.push({
          name,
          address:hasSepateCols?rawAddr:(addrParts?addrParts.address:''),
          city:hasSepateCols?(cityIdx>=0?String(r[cityIdx]||'').trim():''):(addrParts?addrParts.city:''),
          state:hasSepateCols?(stateIdx>=0?String(r[stateIdx]||'').trim():''):(addrParts?addrParts.state:''),
          zip:hasSepateCols?(zipIdx>=0?String(r[zipIdx]||'').trim():''):(addrParts?addrParts.zip:''),
          phone:cleanPhone(phoneIdx>=0?r[phoneIdx]:''),
          email:emailIdx>=0?String(r[emailIdx]||'').trim():'',
          contact:contactIdx>=0?String(r[contactIdx]||'').trim():'',
          notes:notesIdx>=0?String(r[notesIdx]||'').trim():'',
          pricing:notesIdx>=0?String(r[notesIdx]||'').trim():''
        });
      }
      setImportPreview(parsed);
    }catch(err){alert('Error reading file: '+err.message);}
    setImporting(false);
    if(importRef.current)importRef.current.value='';
  };

  const doImport=async()=>{
    if(!importPreview||!importPreview.length)return;
    setImporting(true);
    try{
      const r=await fetch('/api/customers/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customers:importPreview})});
      const result=await r.json();
      alert('Imported '+result.imported+' customers!');
      setImportPreview(null);
    }catch(err){alert('Import error: '+err.message);}
    setImporting(false);
  };

  const customers=data.customers||[];
  const filtered=search?customers.filter(c=>{
    const s=search.toLowerCase();
    return (c.name||'').toLowerCase().includes(s)||(c.city||'').toLowerCase().includes(s)||(c.contact||'').toLowerCase().includes(s)||(c.address||'').toLowerCase().includes(s);
  }):customers;
  filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  return(<div>
    <div style={{display:'flex',gap:12,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
      <button className="bp" onClick={openAdd} style={{fontSize:14,padding:'8px 20px'}}>+ Add Customer</button>
      <label style={{display:'inline-block',background:'#16a34a',color:'#fff',padding:'8px 16px',borderRadius:6,fontSize:14,cursor:'pointer'}}>
        Import File<input ref={importRef} type="file" accept=".csv,.xlsx,.xls" onChange={parseFile} style={{display:'none'}}/>
      </label>

      {importing&&<span style={{fontSize:12,color:'var(--primary)'}}>Processing...</span>}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customers..." style={{flex:1,minWidth:200,fontSize:14,padding:'8px 12px'}}/>
      <span style={{fontSize:13,color:'var(--text-muted)'}}>{filtered.length} customer{filtered.length!==1?'s':''}</span>
    </div>

    {importPreview&&<div style={{background:'#fffbeb',border:'2px solid #d97706',borderRadius:10,padding:16,marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div><strong style={{fontSize:15}}>Preview: {importPreview.length} customers found</strong><div style={{fontSize:12,color:'#92400e'}}>Review below, then click Import to add them all.</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="bc" onClick={()=>setImportPreview(null)}>Cancel</button>
          <button className="bp" onClick={doImport} style={{background:'#16a34a'}}>Import {importPreview.length} Customers</button>
        </div>
      </div>
      <div style={{maxHeight:300,overflowY:'auto',fontSize:12}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#fef3c7'}}>
            <th style={{padding:'4px 8px',textAlign:'left',borderBottom:'1px solid #d97706'}}>Name</th>
            <th style={{padding:'4px 8px',textAlign:'left',borderBottom:'1px solid #d97706'}}>Address</th>
            <th style={{padding:'4px 8px',textAlign:'left',borderBottom:'1px solid #d97706'}}>City</th>
            <th style={{padding:'4px 8px',textAlign:'left',borderBottom:'1px solid #d97706'}}>Phone</th>
            <th style={{padding:'4px 8px',textAlign:'left',borderBottom:'1px solid #d97706'}}>Notes/Pricing</th>
          </tr></thead>
          <tbody>{importPreview.slice(0,50).map((c,i)=>(
            <tr key={i} style={{borderBottom:'1px solid #e5e7eb'}}>
              <td style={{padding:'3px 8px',fontWeight:600}}>{c.name}</td>
              <td style={{padding:'3px 8px'}}>{c.address}</td>
              <td style={{padding:'3px 8px'}}>{c.city}{c.state?', '+c.state:''}</td>
              <td style={{padding:'3px 8px'}}>{c.phone}</td>
              <td style={{padding:'3px 8px',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.notes}</td>
            </tr>
          ))}</tbody>
        </table>
        {importPreview.length>50&&<div style={{padding:8,textAlign:'center',color:'#92400e'}}>...and {importPreview.length-50} more</div>}
      </div>
    </div>}

    {filtered.length===0&&<div style={{textAlign:'center',padding:40,color:'#999',fontSize:14}}>{search?'No customers match your search.':'No customers yet. Click "+ Add Customer" to get started.'}</div>}

    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {filtered.map(c=>(
        <div key={c.id} style={{background:'var(--bg-white)',borderRadius:10,padding:16,boxShadow:'var(--shadow)',cursor:'pointer'}} onClick={()=>openEdit(c)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>{c.name}</div>
              {c.contact&&<div style={{fontSize:13,color:'var(--text-muted)',marginTop:2}}>Contact: {c.contact}</div>}
            </div>
            <div style={{display:'flex',gap:6}}>
              <a href={'/print-customer?'+new URLSearchParams({name:c.name||'',contact:c.contact||'',address:c.address||'',city:c.city||'',state:c.state||'',zip:c.zip||'',phone:c.phone||'',email:c.email||'',pricing:c.pricing||'',notes:c.notes||''}).toString()} target="_blank" style={{display:'inline-block',background:'#475569',color:'#fff',padding:'3px 10px',borderRadius:6,fontSize:11,textDecoration:'none',cursor:'pointer'}} onClick={e=>e.stopPropagation()}>Print</a>
              <button className="bp" style={{fontSize:11,padding:'3px 10px'}} onClick={e=>{e.stopPropagation();openEdit(c);}}>Edit</button>
              <button style={{background:'#fee2e2',color:'var(--danger)',fontSize:11,padding:'3px 10px'}} onClick={e=>{e.stopPropagation();del(c.id,c.name);}}>Delete</button>
            </div>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:16,marginTop:8,fontSize:13}}>
            {(c.address||c.city)&&<div style={{color:'#555'}}>{[c.address,c.city,c.state,c.zip].filter(Boolean).join(', ')}</div>}
            {c.phone&&<div style={{color:'#555'}}>Phone: {c.phone}</div>}
            {c.email&&<div style={{color:'#555'}}>Email: {c.email}</div>}
          </div>
          {c.pricing&&<div style={{marginTop:8,padding:'8px 12px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:6,fontSize:13}}><strong>Pricing:</strong> {c.pricing}</div>}
          {c.notes&&<div style={{marginTop:6,fontSize:12,color:'#666'}}>{c.notes}</div>}
        </div>
      ))}
    </div>

    {showForm&&(<div className="overlay" onClick={()=>setShowForm(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{width:550}}>
        <h2>{editId?'Edit Customer':'Add Customer'}</h2>
        <div className="mrow"><label>Company / Customer Name *</label>
          <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Brenntag Fresno"/></div>
        <div className="mrow"><label>Contact Person</label>
          <input value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} placeholder="e.g. John Smith"/></div>
        <div className="mrow"><label>Address</label>
          <input value={form.address} onChange={e=>setForm({...form,address:e.target.value})} placeholder="Street address"/></div>
        <div style={{display:'flex',gap:8}}>
          <div className="mrow" style={{flex:2}}><label>City</label>
            <input value={form.city} onChange={e=>setForm({...form,city:e.target.value})} placeholder="City"/></div>
          <div className="mrow" style={{flex:1}}><label>State</label>
            <input value={form.state} onChange={e=>setForm({...form,state:e.target.value})} placeholder="CA"/></div>
          <div className="mrow" style={{flex:1}}><label>Zip</label>
            <input value={form.zip} onChange={e=>setForm({...form,zip:e.target.value})} placeholder="93706"/></div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <div className="mrow" style={{flex:1}}><label>Phone</label>
            <input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="(559) 555-1234"/></div>
          <div className="mrow" style={{flex:1}}><label>Email</label>
            <input value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@company.com"/></div>
        </div>
        <div className="mrow"><label>Pricing Info</label>
          <textarea value={form.pricing} onChange={e=>setForm({...form,pricing:e.target.value})} rows={3} placeholder="e.g. Standard rate $85/hr, Overtime $120/hr, Minimum 4 hrs. Hazmat surcharge $50 per load. Net 30 terms."/></div>
        <div className="mrow"><label>Notes</label>
          <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2} placeholder="Gate code, special instructions, dock hours, etc."/></div>
        <div className="mactions">
          <button className="bc" onClick={()=>setShowForm(false)}>Cancel</button>
          <button className="bp" onClick={save}>{editId?'Update':'Add Customer'}</button>
        </div>
      </div>
    </div>)}
  </div>);
}

/* ============ DOCUMENTS ============ */
function Documents(){
  const [docs,setDocs]=useState([]);
  const [uploading,setUploading]=useState(false);
  const [category,setCategory]=useState('General');
  const fileRef=useRef(null);
  const categories=['General','Safety','Permits','Training','Manifests','Inspections','Insurance','Contracts','Other'];

  const loadDocs=async()=>{
    try{const r=await fetch('/api/documents');const d=await r.json();setDocs(d);}catch(e){console.error('Load docs error:',e);}
  };
  useEffect(()=>{loadDocs();},[]);

  const uploadFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setUploading(true);
    try{
      const fd=new FormData();fd.append('file',file);fd.append('category',category);
      const r=await fetch('/api/documents',{method:'POST',body:fd});
      if(r.ok){await loadDocs();}else{alert('Upload failed');}
    }catch(err){alert('Upload error: '+err.message);}
    setUploading(false);
    if(fileRef.current)fileRef.current.value='';
  };

  const deleteDoc=async(id,name)=>{
    if(!confirm('Delete "'+name+'"?'))return;
    await fetch('/api/documents/'+id,{method:'DELETE'});
    loadDocs();
  };

  const formatSize=(bytes)=>{
    if(bytes<1024)return bytes+' B';
    if(bytes<1048576)return(bytes/1024).toFixed(1)+' KB';
    return(bytes/1048576).toFixed(1)+' MB';
  };

  const formatDate=(iso)=>{
    const d=new Date(iso);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  };

  const getIcon=(name)=>{
    const ext=name.split('.').pop().toLowerCase();
    if(ext==='pdf')return'\uD83D\uDCC4';
    if(['doc','docx'].includes(ext))return'\uD83D\uDCC3';
    if(['xls','xlsx'].includes(ext))return'\uD83D\uDCCA';
    if(['jpg','jpeg','png','gif'].includes(ext))return'\uD83D\uDDBC';
    return'\uD83D\uDCC1';
  };

  const [filterCat,setFilterCat]=useState('All');
  const filtered=filterCat==='All'?docs:docs.filter(d=>d.category===filterCat);

  return(<div>
    <div style={{background:'var(--bg-white)',borderRadius:10,padding:20,marginBottom:16,boxShadow:'var(--shadow)'}}>
      <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap',marginBottom:16}}>
        <label style={{fontWeight:700,fontSize:14}}>Upload Document:</label>
        <select value={category} onChange={e=>setCategory(e.target.value)} style={{width:'auto',fontSize:13,padding:'6px 10px'}}>
          {categories.map(c=>(<option key={c}>{c}</option>))}
        </select>
        <input ref={fileRef} type="file" onChange={uploadFile} style={{fontSize:13}} accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.png,.jpg,.jpeg,.gif"/>
        {uploading&&<span style={{fontSize:12,color:'var(--primary)'}}>Uploading...</span>}
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        <button className={filterCat==='All'?'bp':'bc'} style={{fontSize:11,padding:'4px 10px'}} onClick={()=>setFilterCat('All')}>All ({docs.length})</button>
        {categories.map(c=>{const cnt=docs.filter(d=>d.category===c).length;return cnt>0?(<button key={c} className={filterCat===c?'bp':'bc'} style={{fontSize:11,padding:'4px 10px'}} onClick={()=>setFilterCat(c)}>{c} ({cnt})</button>):null;})}
      </div>
    </div>

    {filtered.length===0&&<div style={{textAlign:'center',padding:40,color:'#999',fontSize:14}}>No documents{filterCat!=='All'?' in '+filterCat:''}. Upload files using the form above.</div>}

    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {filtered.map(doc=>(
        <div key={doc.id} style={{background:'var(--bg-white)',borderRadius:8,padding:'12px 16px',boxShadow:'var(--shadow)',display:'flex',alignItems:'center',gap:12}}>
          <a href={'/api/documents/'+doc.id+'/view'} target="_blank" style={{fontSize:24,textDecoration:'none',cursor:'pointer'}}>{getIcon(doc.name)}</a>
          <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>window.open('/api/documents/'+doc.id+'/view','_blank')}>
            <div style={{fontWeight:600,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--primary)'}}>{doc.name}</div>
            <div style={{fontSize:11,color:'var(--text-muted)'}}>{doc.category} &bull; {formatSize(doc.size)} &bull; {formatDate(doc.uploadedAt)}</div>
          </div>
          <a href={'/api/documents/'+doc.id+'/view'} target="_blank" style={{background:'var(--primary)',color:'#fff',padding:'5px 12px',borderRadius:6,fontSize:12,textDecoration:'none',whiteSpace:'nowrap'}}>View</a>
          <a href={'/api/documents/'+doc.id+'/download'} style={{background:'#475569',color:'#fff',padding:'5px 12px',borderRadius:6,fontSize:12,textDecoration:'none',whiteSpace:'nowrap'}}>Download</a>
          <button style={{background:'#fee2e2',color:'var(--danger)',fontSize:12,padding:'5px 12px'}} onClick={()=>deleteDoc(doc.id,doc.name)}>Delete</button>
        </div>
      ))}
    </div>
  </div>);
}
